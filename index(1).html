  '西亚':'亚洲',
  '中亚':'亚洲',
  '东亚':'亚洲',
  '东南亚':'亚洲',
  '南亚':'亚洲',
  '北亚':'亚洲',
  '北欧':'欧洲',
  '西欧':'欧洲',
  '中欧':'欧洲',
  '南欧':'欧洲',
  '东欧':'欧洲',
  '波罗的海':'欧洲',
  '北非':'非洲',
  '东非':'非洲',
  '西非':'非洲',
  '南部非洲':'非洲',
  '印度洋非洲岛屿':'非洲',
  '澳新':'大洋洲',
  '太平洋岛国':'大洋洲',
  '北极圈':'北冰洋'
};

function applyBigRegions(){
  try{CO.splice(0,CO.length,...BIG_REGIONS);}catch(e){}
  try{if(typeof FULL_CO!=='undefined')FULL_CO.splice(0,FULL_CO.length,...BIG_REGIONS);}catch(e){}
}
function normalizeRegions(){
  applyBigRegions();
  (db.countries||[]).forEach(c=>{
    if(!BIG_REGIONS.includes(c.continent)){
      c.continent=REGION_NORMALIZE_MAP[c.continent]||'亚洲';
    }
  });
}
function refreshContinentOptions(){
  applyBigRegions();
  const sel=document.getElementById('ac-cont');
  if(!sel)return;
  const current=sel.value||'亚洲';
  sel.innerHTML=BIG_REGIONS.map(x=>`<option>${x}</option>`).join('');
  sel.value=BIG_REGIONS.includes(current)?current:(REGION_NORMALIZE_MAP[current]||'亚洲');
}

let fbudget=null;
const BUDGET_RANGES=[
  {id:'0-5000',label:'0-5000',min:0,max:5000},
  {id:'5000-10000',label:'5000-10000',min:5000,max:10000},
  {id:'10000-30000',label:'10000-30000',min:10000,max:30000},
  {id:'30000-50000',label:'30000-50000',min:30000,max:50000},
  {id:'50000-70000',label:'50000-70000',min:50000,max:70000},
  {id:'70000-120000',label:'70000-120000',min:70000,max:120000}
];

function ensureBudgetFilterUI(){
  const drawer=document.querySelector('#fdrw .fdi');
  if(!drawer||document.getElementById('budget-pills'))return;
  const clearBtn=drawer.querySelector('.clr');
  const sec=document.createElement('div');
  sec.className='fds';
  sec.id='budget-sec';
  sec.innerHTML='<div class="fdl">预算范围（国家总预算）</div><div class="pills" id="budget-pills"></div><div class="budget-filter-tip">按国家预计总预算筛选，未填写预算会被算作 0。</div>';
  if(clearBtn)drawer.insertBefore(sec,clearBtn);
  else drawer.appendChild(sec);
}
function renderBudgetPills(){
  ensureBudgetFilterUI();
  const el=document.getElementById('budget-pills');
  if(!el)return;
  el.innerHTML=BUDGET_RANGES.map(r=>`<button class="pill${fbudget===r.id?' act':''}" onclick="tBudget('${r.id}')">¥${r.label}</button>`).join('');
  const btn=document.getElementById('ftbtn');
  if(btn)btn.classList.toggle('has',!!(ftags.length||fmonths.length||fcirc||fbudget));
}
function tBudget(id){
  fbudget=fbudget===id?null:id;
  buildFUI();
  render();
}
function inBudgetRange(c){
  if(!fbudget)return true;
  const r=BUDGET_RANGES.find(x=>x.id===fbudget);
  if(!r)return true;
  const total=budgetTotal(c);
  if(r.id==='70000-120000')return total>=r.min&&total<=r.max;
  return total>=r.min&&total<r.max;
}

const __buildFUI_bigBudget=buildFUI;
buildFUI=function(){
  applyBigRegions();
  __buildFUI_bigBudget();
  refreshContinentOptions();
  renderBudgetPills();
};

function clearF(){
  ftags=[];
  fmonths=[];
  fcirc=null;
  fbudget=null;
  buildFUI();
  render();
}

function cmf(c){
  if(fst!=='all'&&c.status!==fst)return false;
  if(fcirc&&c.circuit!==fcirc)return false;
  if(ftags.length){
    const ctags=c.tags||[];
    const ptags=(c.places||[]).flatMap(p=>p.tags||[]);
    if(!ftags.every(t=>ctags.includes(t)||ptags.includes(t)))return false;
  }
  if(fmonths.length&&!(c.places||[]).some(p=>(p.bestMonths||[]).some(m=>fmonths.includes(m))))return false;
  if(!inBudgetRange(c))return false;
  if(sq){
    const t=sq.toLowerCase();
    if(![c.name,(c.circuit||''),(c.continent||''),...(c.tags||[]),...(c.places||[]).flatMap(p=>[p.name,...(p.tags||[])])].some(s=>(s||'').toLowerCase().includes(t)))return false;
  }
  return true;
}

function rContinent(f,body){
  normalizeRegions();
  ensureSettings&&ensureSettings();
  (db.countries||[]).forEach(c=>{try{ensureBudget(c);}catch(e){}});
  const byC={};
  f.forEach(c=>{
    const k=BIG_REGIONS.includes(c.continent)?c.continent:'亚洲';
    if(!byC[k])byC[k]=[];
    byC[k].push(c);
  });
  const active=BIG_REGIONS.filter(cont=>byC[cont]&&byC[cont].length);
  let side=`<aside class="atlas-map">
    <div class="atlas-map-title">Atlas View</div>
    <div class="atlas-map-sub">只保留七大洲五大洋。绿色进度代表该区域里已经打卡的国家/地区。</div>`;
  active.forEach(cont=>{
    const cs=byC[cont];
    const total=cs.length;
    const visited=cs.filter(c=>c.status==='visited').length;
    const p=(typeof pct==='function')?pct(visited,total):(total?Math.round(visited/total*100):0);
    side+=`<a class="atlas-cont" href="#cont-${cont}">
      <div class="atlas-cont-top"><span class="atlas-cont-name">${cont}</span><span class="atlas-cont-count">${visited}/${total}</span></div>
      <div class="atlas-bar"><div class="atlas-bar-fill" style="width:${p}%"></div></div>
    </a>`;
  });
  try{
    const all=allBudget();
    side+=`<div class="budget-panel" style="margin-top:14px;margin-bottom:0">
      <div class="budget-panel-title"><span>Budget</span></div>
      <div class="budget-lines">
        <div class="budget-line"><span>目前资金</span><span>${money(travelFund())}</span></div>
        <div class="budget-line"><span>总预算</span><span>${money(all.total)}</span></div>
        <div class="budget-line"><span>已花费</span><span>${money(all.spent)}</span></div>
        <div class="budget-line"><span>还需要</span><span>${money(all.need)}</span></div>
      </div>
    </div>`;
  }catch(e){}
  side+=`</aside>`;

  let h='<main class="atlas-list">';
  active.forEach(cont=>{
    const cs=byC[cont];
    h+=`<div class="sec" id="cont-${cont}"><div class="sec-hdr"><span>${cont}</span><span class="sec-cnt">${cs.length} 处</span></div>`;
    cs.forEach(c=>h+=ccH(c));
    h+=`</div>`;
  });
  h+='</main>';
  body.innerHTML=active.length?`<div class="atlas-layout">${side}${h}</div>`:'<div class="empty-state">没有符合的目的地</div>';
}

function render(){
  normalizeRegions();
  normalizeCheckins&&normalizeCheckins();
  const f=getF();
  const w=db.countries.filter(c=>c.status==='want').length;
  const v=db.countries.filter(c=>c.status==='visited').length;
  const pv=db.countries.reduce((s,c)=>s+placeVisitedCount(c),0);
  document.getElementById('sub').textContent=`${db.countries.length} 处 · 想去 ${w} · 打卡国家 ${v} · 打卡城市 ${pv}`;
  const body=document.getElementById('body');
  if(view==='stats'){renderStats(body);return;}
  if(!f.length){body.innerHTML='<div class="empty-state">没有符合的目的地</div>';return;}
  if(view==='continent')rContinent(f,body);
  else if(view==='circuit')rCircuit(f,body);
  else rMonth(f,body);
}

    h+=`<div class="timeline" style="margin-top:10px;border-color:#d4c4a0"><div class="sec-hdr" style="margin-bottom:12px"><span>即将出发</span></div>`;
    planned.forEach(c=>{
      const d=c.plannedDate||'';const [y,m]=d.split('-');
      h+=`<div class="tl-item"><div class="tl-dot" style="background:#c9a96e"></div><div><div class="tl-name">${e(c.name)}</div><div class="tl-date">${y?y+'年':''}${m?parseInt(m)+'月':''} · ${e(c.continent||'')} · 还需 ${money(budgetNeed(c))}</div></div></div>`;
    });
    h+=`</div>`;
  }

  body.innerHTML=h;
}

applyBigRegions();
normalizeRegions();
refreshContinentOptions();
buildFUI();
save();
render();
</script>

<script>
/* ===== 排序 + 优先级 + 签证状态逻辑 ===== */
const TRAVEL_PRIORITIES=[
  {value:5,label:'★★★★★ 必去'},
  {value:4,label:'★★★★ 很想去'},
  {value:3,label:'★★★ 想去'},
  {value:2,label:'★★ 一般'},
  {value:1,label:'★ 灵感收藏'},
  {value:0,label:'未设置'}
];

const VISA_OPTIONS=[
  {value:'unknown',label:'未填写',rank:3,cls:''},
  {value:'free',label:'免签',rank:1,cls:'visa-free'},
  {value:'arrival',label:'落地签',rank:2,cls:'visa-arrival'},
  {value:'eta',label:'电子签 / eTA',rank:2,cls:'visa-eta'},
  {value:'sticker',label:'需贴签',rank:4,cls:'visa-hard'},
  {value:'conditional',label:'有条件入境',rank:3,cls:''},
  {value:'hard',label:'暂不方便',rank:5,cls:'visa-hard'}
];

const SORT_OPTIONS=[
  {value:'default',label:'默认排序'},
  {value:'priority-desc',label:'优先级 高 → 低'},
  {value:'priority-asc',label:'优先级 低 → 高'},
  {value:'budget-asc',label:'预算 低 → 高'},
  {value:'budget-desc',label:'预算 高 → 低'},
  {value:'planned-asc',label:'计划时间 近 → 远'},
  {value:'visited-desc',label:'打卡时间 新 → 旧'},
  {value:'visa-easy',label:'签证便利优先'},
  {value:'name-asc',label:'名称 A → Z'}
];

let sortMode=(function(){
  try{
    const d=localStorage.getItem('ta-sort-mode');
    return d||'default';
  }catch(e){return 'default';}
})();

function ensureCountryMeta(c){
  if(!c)return c;
  if(typeof c.priority==='undefined')c.priority=0;
  c.priority=Number(c.priority)||0;
  if(!c.visa)c.visa='unknown';
  return c;
}
function priorityLabel(v){
  const p=TRAVEL_PRIORITIES.find(x=>x.value===Number(v));
  return p?p.label:'未设置';
}
function priorityStars(v){
  v=Number(v)||0;
  return v?('★'.repeat(v)+'☆'.repeat(5-v)):'未设优先级';
}
function visaInfo(v){
  return VISA_OPTIONS.find(x=>x.value===v)||VISA_OPTIONS[0];
}
function visaLabel(v){
  return visaInfo(v).label;
}
function visaRank(v){
  return visaInfo(v).rank;
}
function metaBadgesHTML(c){
  ensureCountryMeta(c);
  const p=c.priority?`<span class="meta-badge priority">${priorityStars(c.priority)}</span>`:'';
  const vi=visaInfo(c.visa);
  const v=c.visa&&c.visa!=='unknown'?`<span class="meta-badge ${vi.cls}">签证：${vi.label}</span>`:'';
  return p+v;
}
function injectSortUI(){
  const row=document.querySelector('.hdr-row3');
  if(!row||document.getElementById('sort-mode'))return;
  const html=`<div class="sort-wrap">
    <span class="sort-label">排序</span>
    <select class="sort-select" id="sort-mode" onchange="setSortMode(this.value)">
      ${SORT_OPTIONS.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}
    </select>
  </div>`;
  row.insertAdjacentHTML('beforeend',html);
  const sel=document.getElementById('sort-mode');
  if(sel)sel.value=sortMode;
}
function setSortMode(v){
  sortMode=v||'default';
  try{localStorage.setItem('ta-sort-mode',sortMode);}catch(e){}
  render();
}
function normalizeMeta(){
  (db.countries||[]).forEach(ensureCountryMeta);
}
function compareDateAsc(a,b,key){
  const av=a[key]||'9999-99';
  const bv=b[key]||'9999-99';
  return av.localeCompare(bv);
}
function compareDateDesc(a,b,key){
  const av=a[key]||'0000-00';
  const bv=b[key]||'0000-00';
  return bv.localeCompare(av);
}
function sortedCountries(arr){
  const original=(db.countries||[]);
  const list=arr.slice();
  const idx=c=>original.indexOf(c);
  list.sort((a,b)=>{
    ensureCountryMeta(a);ensureCountryMeta(b);
    if(sortMode==='priority-desc')return (b.priority||0)-(a.priority||0)||idx(a)-idx(b);
    if(sortMode==='priority-asc')return (a.priority||0)-(b.priority||0)||idx(a)-idx(b);
    if(sortMode==='budget-asc')return budgetTotal(a)-budgetTotal(b)||idx(a)-idx(b);
    if(sortMode==='budget-desc')return budgetTotal(b)-budgetTotal(a)||idx(a)-idx(b);
    if(sortMode==='planned-asc')return compareDateAsc(a,b,'plannedDate')||idx(a)-idx(b);
    if(sortMode==='visited-desc')return compareDateDesc(a,b,'visitedDate')||idx(a)-idx(b);
    if(sortMode==='visa-easy')return visaRank(a.visa)-visaRank(b.visa)||idx(a)-idx(b);
    if(sortMode==='name-asc')return (a.name||'').localeCompare(b.name||'','zh-Hans-CN')||idx(a)-idx(b);
    return idx(a)-idx(b);
  });
  return list;
}

const __getF_meta=getF;
getF=function(){
  normalizeMeta();
  return sortedCountries(__getF_meta());
};

function injectMetaFields(){
  const status=document.getElementById('ac-status');
  if(!status||document.getElementById('ac-priority'))return;
  const box=`<div class="fg" id="meta-fields">
    <label class="fl">优先级</label>
    <select class="fsel" id="ac-priority">
      ${TRAVEL_PRIORITIES.map(p=>`<option value="${p.value}">${p.label}</option>`).join('')}
    </select>
  </div>
  <div class="fg">
    <label class="fl">签证状态</label>
    <select class="fsel" id="ac-visa">
      ${VISA_OPTIONS.map(v=>`<option value="${v.value}">${v.label}</option>`).join('')}
    </select>
  </div>`;
  status.closest('.fg').insertAdjacentHTML('afterend',box);
}
function resetMetaForm(){
  const p=document.getElementById('ac-priority');
  const v=document.getElementById('ac-visa');
  if(p)p.value='0';
  if(v)v.value='unknown';
}
function fillMetaForm(c){
  ensureCountryMeta(c);
  const p=document.getElementById('ac-priority');
  const v=document.getElementById('ac-visa');
  if(p)p.value=String(c.priority||0);
  if(v)v.value=c.visa||'unknown';
}
function readMetaForm(){
  const p=document.getElementById('ac-priority');
  const v=document.getElementById('ac-visa');
  return {
    priority:p?Number(p.value)||0:0,
    visa:v?v.value:'unknown'
  };
}

const __openAC_meta=openAC;
openAC=function(){
  injectMetaFields();
  __openAC_meta();
  injectMetaFields();
  resetMetaForm();
};

const __openEditC_meta=openEditC;
openEditC=function(){
  injectMetaFields();
  __openEditC_meta();
  injectMetaFields();
  const c=db.countries.find(x=>x.id===cid||x.id===editingCId);
  if(c)fillMetaForm(c);
};

const __submitAC_meta=submitAC;
submitAC=function(){
  injectMetaFields();
  const name=document.getElementById('ac-name')?document.getElementById('ac-name').value.trim():'';
  const meta=readMetaForm();
  __submitAC_meta();
  let target=null;
  if(editingCId)target=db.countries.find(x=>x.id===editingCId);
  if(!target&&name)target=[...(db.countries||[])].reverse().find(x=>x.name===name);
  if(target){
    target.priority=meta.priority;
    target.visa=meta.visa;
    save();
    render();
    if(document.getElementById('sheet').classList.contains('open')&&cid===target.id)renderCS();
  }
};

const __ccH_meta=ccH;
ccH=function(c){
  ensureCountryMeta(c);
  let h=__ccH_meta(c);
  const badges=metaBadgesHTML(c);
  if(badges){
    h=h.replace('<span class="cc-info">',badges+'<span class="cc-info">');
  }
  return h;
};

const __renderCS_meta=renderCS;
renderCS=function(){
  __renderCS_meta();
  const c=db.countries.find(x=>x.id===cid);
  if(!c)return;
  ensureCountryMeta(c);
  const top=document.querySelector('#si2 .cs-top');
  if(!top||document.getElementById('country-meta-panel'))return;
  const vi=visaInfo(c.visa);
  top.insertAdjacentHTML('afterend',`<div class="country-meta-panel" id="country-meta-panel">
    <div class="country-meta-item"><b>${priorityLabel(c.priority)}</b><span>优先级</span></div>
    <div class="country-meta-item"><b>${vi.label}</b><span>签证状态</span></div>
  </div>`);
};

const __renderStats_meta=renderStats;
renderStats=function(body){
  __renderStats_meta(body);
  normalizeMeta();
  const priorityRows=[5,4,3,2,1,0].map(v=>{
    const count=(db.countries||[]).filter(c=>(Number(c.priority)||0)===v).length;
    return `<div class="meta-stat-row"><span>${priorityLabel(v)}</span><span>${count} 处</span></div>`;
  }).join('');
  const visaRows=VISA_OPTIONS.map(v=>{
    const count=(db.countries||[]).filter(c=>(c.visa||'unknown')===v.value).length;
    return `<div class="meta-stat-row"><span>${v.label}</span><span>${count} 处</span></div>`;
  }).join('');
  body.insertAdjacentHTML('beforeend',`<div class="meta-stat-grid">
    <div class="meta-stat-card"><div class="meta-stat-title">Priority</div>${priorityRows}</div>
    <div class="meta-stat-card"><div class="meta-stat-title">Visa Status</div>${visaRows}</div>
  </div>`);
};

const __cmf_meta=cmf;
cmf=function(c){
  // 原筛选先跑。若搜索词只命中签证/优先级，原函数可能会过滤掉，所以这里补一次搜索特判。
  if(!sq)return __cmf_meta(c);
  const oldSq=sq;
  sq='';
  const base=__cmf_meta(c);
  sq=oldSq;
  if(!base)return false;
  const t=oldSq.toLowerCase();
  const metaText=[priorityLabel(c.priority),priorityStars(c.priority),visaLabel(c.visa),'签证','优先级'].join(' ').toLowerCase();
  const normalText=[c.name,(c.circuit||''),(c.continent||''),...(c.tags||[]),...(c.places||[]).flatMap(p=>[p.name,...(p.tags||[]),...(p.notes||[]).map(n=>n.text||'')])].join(' ').toLowerCase();
  return (metaText+' '+normalText).includes(t);
};

normalizeMeta();
injectSortUI();
injectMetaFields();
save();
render();
</script>

<script>
/* ===== 环线天数真正可加减，顺序移动改成明确按钮 ===== */
function adjustCircuitDays(id,delta,ev){
  if(ev){
    ev.stopPropagation();
    ev.preventDefault();
  }
  const c=db.countries.find(x=>x.id===id);
  if(!c)return;
  c.circuitDays=Math.max(0,(Number(c.circuitDays)||0)+delta);
  save();
  render();
  if(document.getElementById('sheet')&&document.getElementById('sheet').classList.contains('open')&&cid===id){
    renderCS();
  }
}

function rCircuit(f,body){
  normalizeRegions&&normalizeRegions();
  normalizeCheckins&&normalizeCheckins();
  const circs={};
  f.forEach(c=>{
    if(c.circuit){
      if(!circs[c.circuit])circs[c.circuit]=[];
      circs[c.circuit].push(c);
    }
  });
  const keys=Object.keys(circs).sort();
  if(!keys.length){
    body.innerHTML='<div class="empty-state">还没有自定义环线<br><span style="font-size:12px;opacity:.6">添加目的地时填写「环线」字段即可</span></div>';
    return;
  }

  let h='';
  keys.forEach(cn=>{
    const members=circs[cn].slice().sort((a,b)=>(a.circuitOrder||99)-(b.circuitOrder||99));
    const totalDays=members.reduce((s,c)=>s+(Number(c.circuitDays)||0),0);
    let budgetHTML='';
    try{
      const b=circuitBudget(cn);
      budgetHTML=`<span class="circ-days-total">预算 ${money(b.total)}</span><span class="circ-days-total">已花 ${money(b.spent)}</span><span class="circ-days-total">还需 ${money(b.need)}</span>`;
    }catch(e){}

    h+=`<div class="sec"><div class="circ-meta">
      <span class="circ-name">✦ ${e(cn)}</span>
      <span class="circ-days-total">共约 ${totalDays} 天</span>
      ${budgetHTML}
    </div><div class="circ-items">`;

    members.forEach((c,i)=>{
      const tags=(c.tags||[]).map(t=>`<span class="tc">${e(t)}</span>`).join('');
      let budgetLine='';
      try{
        budgetLine=`<br>预算 ${money(budgetTotal(c))} · 已花 ${money(budgetSpent(c))} · 还需 ${money(budgetNeed(c))}`;
      }catch(e){}
      h+=`<div class="circ-item" onclick="cid='${c.id}';renderCS();openSheet()">
        <div class="circ-order">${c.circuitOrder||i+1}</div>
        <div class="circ-item-body">
          <div class="circ-item-name">${hl(c.name)}</div>
          <div class="circ-item-meta">${e(c.continent||'')} ${tags}${budgetLine}</div>
        </div>
        <div class="circ-item-days">
          <span>${Number(c.circuitDays)||0}天</span>
          <span class="day-stepper">
            <button title="减少一天" onclick="adjustCircuitDays('${c.id}',-1,event)">−</button>
            <button title="增加一天" onclick="adjustCircuitDays('${c.id}',1,event)">＋</button>
          </span>
        </div>
        <div class="circ-reorder">
          <span class="order-label">顺序</span>
          <span class="order-stepper">
            <button title="上移" onclick="event.stopPropagation();moveCircuit('${c.id}',-1)">↑</button>
            <button title="下移" onclick="event.stopPropagation();moveCircuit('${c.id}',1)">↓</button>
          </span>
        </div>
      </div>`;
    });

    h+=`</div></div>`;
  });
  body.innerHTML=h;
}

render();
</script>

<script>
/* ===== 统计页点击优先级 / 签证后显示对应国家，并可打开详情 ===== */
let activeStatPanel=null;

function statCountriesBy(type,value){
  normalizeMeta&&normalizeMeta();
  normalizeRegions&&normalizeRegions();
  normalizeCheckins&&normalizeCheckins();
  const all=db.countries||[];
  if(type==='priority')return sortedCountries(all.filter(c=>(Number(c.priority)||0)===Number(value)));
  if(type==='visa')return sortedCountries(all.filter(c=>(c.visa||'unknown')===value));
  return [];
}
function statPanelTitle(type,value){
  if(type==='priority')return '优先级 · '+priorityLabel(Number(value));
  if(type==='visa')return '签证状态 · '+visaLabel(value);
  return '详情';
}
function openStatPanel(type,value){
  const key=type+':'+value;
  activeStatPanel=activeStatPanel===key?null:key;
  render();
}
function clearStatPanel(){
  activeStatPanel=null;
  render();
}
function openCountryFromStats(id){
  const c=(db.countries||[]).find(x=>x.id===id);
  if(!c)return;
  cid=id;
  pid=null;
  renderCS();
  openSheet();
}
function statCountryCardsHTML(type,value){
  const list=statCountriesBy(type,value);
  if(!list.length)return '<div class="stat-empty">这个分类下面还没有目的地</div>';
  return `<div class="stat-country-grid">${list.map(c=>{
    ensureCountryMeta(c);
    const vi=visaInfo(c.visa);
    let b='';
    try{b=budgetTotal(c)?`<span class="meta-badge">预算 ${money(budgetTotal(c))}</span>`:'';}catch(e){}
    const cities=(c.places||[]).length;
    const done=placeVisitedCount(c);
    return `<div class="stat-country-card" onclick="openCountryFromStats('${c.id}')">
      <div class="stat-country-name" title="${e(c.name)}">${e(c.name)}</div>
      <div class="stat-country-meta">
        <span class="meta-badge priority">${priorityStars(c.priority)}</span>
        <span class="meta-badge ${vi.cls}">签证：${vi.label}</span>
        <span class="meta-badge">${e(c.continent||'')}</span>
        ${c.circuit?`<span class="meta-badge">环线：${e(c.circuit)}</span>`:''}
        ${cities?`<span class="meta-badge">城市 ${done}/${cities}</span>`:''}
        ${b}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function renderActiveStatPanelHTML(){
  if(!activeStatPanel)return '';
  const [type,value]=activeStatPanel.split(':');
  return `<div class="stat-detail-panel">
    <div class="stat-detail-head">
      <div class="stat-detail-title">${statPanelTitle(type,value)}</div>
      <button class="stat-detail-close" onclick="clearStatPanel()">收起</button>
    </div>
    ${statCountryCardsHTML(type,value)}
  </div>`;
}

const __renderStats_clickable=renderStats;
renderStats=function(body){
  __renderStats_clickable(body);

  // 把原来的 Priority / Visa Status 统计行变成可点击。
  const cards=[...body.querySelectorAll('.meta-stat-card')];
  cards.forEach(card=>{
    const title=(card.querySelector('.meta-stat-title')?.textContent||'').trim();
    const rows=[...card.querySelectorAll('.meta-stat-row')];
    rows.forEach(row=>{
      const label=row.querySelector('span:first-child')?.textContent?.trim()||'';
      if(title==='Priority'){
        const p=TRAVEL_PRIORITIES.find(x=>x.label===label);
        if(!p)return;
        row.classList.add('clickable');
        if(activeStatPanel==='priority:'+p.value)row.classList.add('active');
        row.onclick=()=>openStatPanel('priority',String(p.value));
      }
      if(title==='Visa Status'){
        const v=VISA_OPTIONS.find(x=>x.label===label);
        if(!v)return;
        row.classList.add('clickable');
        if(activeStatPanel==='visa:'+v.value)row.classList.add('active');
        row.onclick=()=>openStatPanel('visa',v.value);
      }
    });
  });

  const grid=body.querySelector('.meta-stat-grid');
  if(grid&&activeStatPanel){
    grid.insertAdjacentHTML('afterend',renderActiveStatPanelHTML());
  }
};

render();
</script>

<script>
/* ===== 月份视图：每个月只列国家，点国家后在详情里显示适合该月的地区 ===== */
let monthFocus=null;
let monthFocusCid=null;

function countriesForMonth(list,m){
  const rows=[];
  (list||[]).forEach(c=>{
    const places=(c.places||[]).filter(p=>(p.bestMonths||[]).includes(m));
    if(places.length)rows.push({c,places});
  });
  return sortedCountries?rows.sort((a,b)=>sortedCountries([a.c,b.c]).indexOf(a.c)-sortedCountries([a.c,b.c]).indexOf(b.c)):rows;
}

function openMonthCountry(ci,m){
  cid=ci;
  pid=null;
  monthFocus=m;
  monthFocusCid=ci;
  renderCS();
  openSheet();
}

function rMonth(f,body){
  normalizeRegions&&normalizeRegions();
  normalizeCheckins&&normalizeCheckins();

  let h='<div class="mgrid">';
  for(let m=1;m<=12;m++){
    const rows=countriesForMonth(f,m);
    h+=`<div class="mcard"><div class="mcard-hdr"><span>${MA[m-1]}</span><small>${rows.length}国</small></div>`;
    if(!rows.length){
      h+='<div class="mempty">暂无</div>';
    }else{
      rows.forEach(({c,places})=>{
        h+=`<div class="mpr" onclick="openMonthCountry('${c.id}',${m})">
          <div class="month-country-main">
            <div style="min-width:0">
              <div class="month-country-name" title="${e(c.name)}">${hl(c.name)}</div>
              <div class="month-country-meta">${e(c.continent||'')} ${c.circuit?' · '+e(c.circuit):''}</div>
            </div>
            <span class="month-match-count">${places.length}处适合</span>
          </div>
        </div>`;
      });
    }
    h+=`</div>`;
  }
  body.innerHTML=h+'</div>';
}

function injectMonthFocusBox(){
  if(!monthFocus||monthFocusCid!==cid)return;
  const c=(db.countries||[]).find(x=>x.id===cid);
  if(!c)return;
  const places=(c.places||[]).filter(p=>(p.bestMonths||[]).includes(monthFocus));
  if(!places.length)return;
  const top=document.querySelector('#si2 .cs-top');
  if(!top||document.getElementById('month-focus-box'))return;
  const html=`<div class="month-focus-box" id="month-focus-box">
    <div class="month-focus-title">${MA[monthFocus-1]}适合去的地区 / 城市</div>
    <div class="month-focus-places">
      ${places.map(p=>`<button class="month-focus-place" onclick="openPD('${c.id}','${p.id}')">${e(p.name)}</button>`).join('')}
    </div>
  </div>`;
  top.insertAdjacentHTML('afterend',html);
}

const __renderCS_monthGrouped=renderCS;
renderCS=function(){
  __renderCS_monthGrouped();
  injectMonthFocusBox();
};

const __setView_monthGrouped=setView;
setView=function(v,btn){
  if(v!=='month'){
    monthFocus=null;
    monthFocusCid=null;

};

  };
}

render();
</script>

  try{if(typeof FULL_CO!=='undefined')FULL_CO.splice(0,FULL_CO.length,...FINAL_REGIONS);}catch(e){}
}

function finalSyncCountryByPlaces(c){
  if(!c)return;
  const visited=(c.places||[]).filter(p=>!!(p.visited||p.visitedDate));
  if(visited.length){
    c.status='visited';
    c.autoVisitedByPlace=true;
    const dates=visited.map(p=>p.visitedDate).filter(Boolean).sort();
    c.visitedDate=dates[0]||null;
  }else if(c.autoVisitedByPlace){
    c.autoVisitedByPlace=false;
    if(c.status==='visited'){
      c.status='want';
      c.visitedDate=null;
    }
  }
}

syncCountryByPlaces=finalSyncCountryByPlaces;

function finalNormalizeData(){
  finalApplyTaxonomy();
  if(!db.settings)db.settings={travelFund:0};
  (db.countries||[]).forEach(c=>{
    c.status=c.status==='visited'?'visited':'want';
    c.tags=(c.tags||[]).filter(t=>FINAL_TAGS_12.includes(t));
    if(!FINAL_REGIONS.includes(c.continent))c.continent='亚洲';
    if(typeof c.priority==='undefined')c.priority=0;
    if(!c.visa)c.visa='unknown';
    if(!c.budget)c.budget={flight:0,hotel:0,food:0,local:0,ticket:0,shopping:0,other:0};
    if(typeof c.spent==='undefined')c.spent=0;
    (c.places||[]).forEach(p=>{
      p.tags=(p.tags||[]).filter(t=>FINAL_TAGS_12.includes(t));
      if(typeof p.visited==='undefined')p.visited=!!p.visitedDate;
      if(!p.notes)p.notes=[];
    });
    finalSyncCountryByPlaces(c);
  });
}

function finalImportIfNeeded(){
  finalApplyTaxonomy();
  let imported=false;
  try{imported=localStorage.getItem(FINAL_IMPORT_KEY)==='1';}catch(e){}
  if(!imported){
    db=finalDeepCopy(FINAL_TRAVEL_DB);
    finalNormalizeData();
    try{
      localStorage.setItem('ta-v6',JSON.stringify(db));
      localStorage.setItem(FINAL_IMPORT_KEY,'1');
    }catch(e){}
  }else{
    finalNormalizeData();
  }
}

function getVisitedCityRecords(){
  const rows=[];
  (db.countries||[]).forEach(c=>{
    (c.places||[]).forEach(p=>{
      if(p.visited||p.visitedDate){
        rows.push({
          countryId:c.id,
          placeId:p.id,
          country:c.name,
          continent:c.continent||'',
          name:p.name,
          date:p.visitedDate||'',
          ts:p.visitedDate||''
        });
      }
    });
  });
  rows.sort((a,b)=>{
    if(a.date&&b.date)return b.date.localeCompare(a.date);
    if(a.date&&!b.date)return -1;
    if(!a.date&&b.date)return 1;
    return (a.continent+a.country+a.name).localeCompare(b.continent+b.country+b.name,'zh-Hans-CN');
  });
  return rows;
}

let checkinView='timeline';
let checkinShowAll=false;

function setCheckinView(v){
  checkinView=v;
  checkinShowAll=false;
  render();
}
function toggleCheckinAll(){
  checkinShowAll=!checkinShowAll;
  render();
}
function openVisitedPlace(ci,pi){
  cid=ci;
  pid=pi;
  renderPS();
  openSheet();
}

function renderCityCheckinsPanel(){
  const rows=getVisitedCityRecords();
  if(!rows.length)return '';
  const shown=checkinView==='timeline'?(checkinShowAll?rows:rows.slice(0,3)):rows;
  let h=`<div class="timeline" style="margin-top:10px">
    <div class="sec-hdr" style="margin-bottom:12px"><span>城市打卡记录</span><span class="sec-cnt">${rows.length} 处</span></div>
    <div class="checkin-toolbar">
      <button class="checkin-toggle ${checkinView==='timeline'?'active':''}" onclick="setCheckinView('timeline')">时间轴</button>
      <button class="checkin-toggle ${checkinView==='region'?'active':''}" onclick="setCheckinView('region')">七大洲五大洋</button>
    </div>`;
  if(checkinView==='timeline'){
    shown.forEach(x=>{
      const ds=x.date?x.date.replace('-','/'):'时间待补';
      h+=`<div class="tl-item" onclick="openVisitedPlace('${x.countryId}','${x.placeId}')" style="cursor:pointer">
        <div class="tl-dot"></div>
        <div><div class="tl-name">${e(x.name)}</div><div class="tl-date">${ds} · ${e(x.country)} · ${e(x.continent)}</div></div>
      </div>`;
    });
    if(rows.length>3){
      h+=`<button class="checkin-more" onclick="toggleCheckinAll()">${checkinShowAll?'只显示近期 3 个':'查看全部 '+rows.length+' 个'}</button>`;
    }
  }else{
    const grouped={};
    rows.forEach(x=>{
      const k=x.continent||'其他';
      if(!grouped[k])grouped[k]=[];
      grouped[k].push(x);
    });
    FINAL_REGIONS.concat(['其他']).forEach(region=>{
      const list=grouped[region];
      if(!list||!list.length)return;
      h+=`<div class="checkin-group"><div class="checkin-group-title">${region} · ${list.length} 处</div>`;
      list.forEach(x=>{
        h+=`<button class="checkin-city" onclick="openVisitedPlace('${x.countryId}','${x.placeId}')">${e(x.country)} · ${e(x.name)}</button>`;
      });
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

renderStats=function(body){
  finalNormalizeData();
  const all=db.countries;
  const visited=all.filter(c=>c.status==='visited');
  const want=all.filter(c=>c.status==='want');
  const allPlaces=all.flatMap(c=>c.places||[]);
  const visitedPlaces=allPlaces.filter(p=>p.visited||p.visitedDate);
  const allNotes=allPlaces.flatMap(p=>p.notes||[]);
  const totalImgs=allNotes.reduce((s,n)=>s+(n.images||[]).length,0);
  const b=allBudget();
  const fund=travelFund();
  const fundPct=pct(fund,b.total);
  const countryPct=pct(visited.length,all.length);
  const cityPct=pct(visitedPlaces.length,allPlaces.length);

  let h=`<div class="fund-panel">
    <div class="fund-top">
      <div>
        <div class="fund-title">Travel Fund</div>
        <div class="fund-big">${money(fund)}</div>
        <div class="progress-note">总预算 ${money(b.total)} · 已花 ${money(b.spent)} · 未来还需 ${money(b.need)}</div>
      </div>
      <div class="fund-controls">
        <input class="fund-input" id="travel-fund-input" type="number" min="0" step="1" value="${fund}" placeholder="目前旅行资金">
        <button class="fund-btn" onclick="setTravelFundFromInput()">保存资金</button>
        <input class="fund-input" id="travel-fund-delta" type="number" min="0" step="1" placeholder="加减金额">
        <button class="fund-btn light" onclick="adjustTravelFund(1)">＋增加</button>
        <button class="fund-btn light" onclick="adjustTravelFund(-1)">－减少</button>
      </div>
    </div>
    <div class="progress-grid">
      <div class="progress-card">
        <div class="progress-head"><span>资金覆盖率</span><span>${fundPct}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${fundPct}%"></div></div>
        <div class="progress-note">目前旅行资金 / 全部旅行预算</div>
      </div>
      <div class="progress-card">
        <div class="progress-head"><span>旅行完成率</span><span>${countryPct}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${countryPct}%"></div></div>
        <div class="progress-note">旅行过的国家地区 / 已记录的国家地区</div>
      </div>
    </div>
  </div>`;

  h+=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${visited.length}</div><div class="stat-sub">已打卡国家/地区</div><div class="stat-detail">共 ${all.length} 处在册 · ${countryPct}%</div></div>
    <div class="stat-card"><div class="stat-num">${visitedPlaces.length}</div><div class="stat-sub">已打卡城市/景点</div><div class="stat-detail">共 ${allPlaces.length} 处在册 · ${cityPct}%</div></div>
    <div class="stat-card"><div class="stat-num">${money(b.need)}</div><div class="stat-sub">未来还需要</div><div class="stat-detail">总预算 ${money(b.total)} · 资金 ${money(fund)}</div></div>
    <div class="stat-card"><div class="stat-num">${allNotes.length}</div><div class="stat-sub">条备注</div><div class="stat-detail">${totalImgs} 张图片</div></div>
  </div>`;

  const circs=[...new Set(all.map(c=>c.circuit).filter(Boolean))];
  if(circs.length){
    h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>环线预算</span></div>`;
    circs.forEach(cn=>{
      const cb=circuitBudget(cn);
      h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${e(cn)}</span><span>总 ${money(cb.total)} · 已花 ${money(cb.spent)} · 还需 ${money(cb.need)}</span></div><div class="cont-bar-track"><div class="cont-bar-fill" style="width:${cb.total?Math.min(100,Math.round(cb.spent/cb.total*100)):0}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>七大洲五大洋覆盖</span></div>`;
  FINAL_REGIONS.forEach(cont=>{
    const total=all.filter(c=>c.continent===cont).length;
    const vis=visited.filter(c=>c.continent===cont).length;
    if(!total)return;
    const p=pct(vis,total);
    h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${cont}</span><span>${vis}/${total}</span></div><div class="cont-bar-track"><div class="cont-bar-fill${vis?'':' none'}" style="width:${p}%"></div></div></div>`;
  });
  h+=`</div>`;

  h+=renderCityCheckinsPanel();

  const priorityRows=[5,4,3,2,1,0].map(v=>{
    const count=(db.countries||[]).filter(c=>(Number(c.priority)||0)===v).length;
    return `<div class="meta-stat-row clickable" onclick="openStatPanel('priority','${v}')"><span>${priorityLabel(v)}</span><span>${count} 处</span></div>`;
  }).join('');
  const visaRows=VISA_OPTIONS.map(v=>{
    const count=(db.countries||[]).filter(c=>(c.visa||'unknown')===v.value).length;
    return `<div class="meta-stat-row clickable" onclick="openStatPanel('visa','${v.value}')"><span>${v.label}</span><span>${count} 处</span></div>`;
  }).join('');
  h+=`<div class="meta-stat-grid">
    <div class="meta-stat-card"><div class="meta-stat-title">Priority</div>${priorityRows}</div>
    <div class="meta-stat-card"><div class="meta-stat-title">Visa Status</div>${visaRows}</div>
  </div>`;
  if(typeof renderActiveStatPanelHTML==='function'&&activeStatPanel){
    h+=renderActiveStatPanelHTML();
  }

  body.innerHTML=h;
};

finalImportIfNeeded();
buildFUI();
save();
render();
</script>

<script>
/* ===== 统计卡片可跳转 + 城市记录按国家/地区/区域查看 ===== */
var activeQuickStat=null;
checkinView='timeline-country';
expandedCheckinGroups={};

function checkinMonthKey(x){
  return x.date || '时间待补';
}
function checkinMonthLabel(x){
  return x.date ? x.date.replace('-','/') : '时间待补';
}
function toggleQuickStat(type){
  activeQuickStat=activeQuickStat===type?null:type;
  render();
}
function clearQuickStat(){
  activeQuickStat=null;
  render();
}
function toggleCheckinGroup(key,ev){
  if(ev){
    ev.stopPropagation();
    ev.preventDefault();
  }
  expandedCheckinGroups[key]=!expandedCheckinGroups[key];
  render();
}
function setCheckinView(v){
  checkinView=v;
  checkinShowAll=false;
  expandedCheckinGroups={};
  render();
}
function quickCountryCardHTML(c){
  const visitedPlaces=(c.places||[]).filter(p=>p.visited||p.visitedDate);
  let budget='';
  try{budget=budgetTotal(c)?`<span class="meta-badge">预算 ${money(budgetTotal(c))}</span>`:'';}catch(e){}
  return `<div class="quick-card" onclick="openCountryFromStats('${c.id}')">
    <div class="quick-name" title="${e(c.name)}">${e(c.name)}</div>
    <div class="quick-meta">
      <span class="meta-badge">${e(c.continent||'')}</span>
      <span class="meta-badge">${c.status==='visited'?'已打卡':'想去'}</span>
      ${visitedPlaces.length?`<span class="meta-badge">地区 ${visitedPlaces.length}/${(c.places||[]).length}</span>`:''}
      ${budget}
    </div>
  </div>`;
}
function quickPlaceCardHTML(row){
  return `<div class="quick-card" onclick="openVisitedPlace('${row.countryId}','${row.placeId}')">
    <div class="quick-name" title="${e(row.name)}">${e(row.name)}</div>
    <div class="quick-meta">
      <span class="meta-badge">${e(row.country)}</span>
      <span class="meta-badge">${e(row.continent)}</span>
      <span class="meta-badge">${row.date?row.date.replace('-','/'):'时间待补'}</span>
    </div>
  </div>`;
}
function quickNoteCardHTML(item){
  return `<div class="quick-card" onclick="openVisitedPlace('${item.countryId}','${item.placeId}')">
    <div class="quick-name" title="${e(item.place)}">${e(item.country)} · ${e(item.place)}</div>
    <div class="quick-meta"><span class="meta-badge">${e(item.cat)}</span><span class="meta-badge">${e(item.date)}</span></div>
    <div style="font-size:12px;color:#7a6038;line-height:1.5;margin-top:7px">${e(item.text).slice(0,80)}${item.text&&item.text.length>80?'…':''}</div>
  </div>`;
}
function renderQuickStatPanel(){
  if(!activeQuickStat)return '';
  const all=db.countries||[];
  const visited=all.filter(c=>c.status==='visited');
  const checkins=getVisitedCityRecords();
  let title='', content='';
  if(activeQuickStat==='countries'){
    title='已打卡国家 / 地区';
    content=`<div class="quick-grid">${visited.map(quickCountryCardHTML).join('')}</div>`;
  }else if(activeQuickStat==='places'){
    title='已打卡城市 / 景点';
    content=`<div class="quick-grid">${checkins.map(quickPlaceCardHTML).join('')}</div>`;
  }else if(activeQuickStat==='budget'){
    title='预算与资金';
    const b=allBudget();
    const fund=travelFund();
    const needList=sortedCountries(all.filter(c=>budgetNeed(c)>0)).slice(0,24);
    content=`<div class="budget-summary" style="margin-bottom:12px">
      <div class="budget-chip"><b>${money(fund)}</b><span>目前旅行资金</span></div>
      <div class="budget-chip"><b>${money(b.total)}</b><span>总预算</span></div>
      <div class="budget-chip"><b>${money(b.need)}</b><span>未来还需</span></div>
    </div>
    <div class="quick-grid">${needList.length?needList.map(quickCountryCardHTML).join(''):'<div class="stat-empty">还没有填写国家预算</div>'}</div>`;
  }else if(activeQuickStat==='notes'){
    title='备注';
    const notes=[];
    all.forEach(c=>(c.places||[]).forEach(p=>(p.notes||[]).forEach(n=>{
      notes.push({
        countryId:c.id,placeId:p.id,country:c.name,place:p.name,cat:n.cat||'通用',
        text:n.text||'',date:n.ts?new Date(n.ts).toLocaleDateString('zh-CN'):''
      });
    })));
    notes.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    content=`<div class="quick-grid">${notes.map(quickNoteCardHTML).join('')}</div>`;
  }
  return `<div class="quick-stat-panel">
    <div class="quick-stat-head">
      <div class="quick-stat-title">${title}</div>
      <button class="quick-stat-close" onclick="clearQuickStat()">收起</button>
    </div>
    ${content||'<div class="stat-empty">暂无内容</div>'}
  </div>`;
}

function renderCountryTimeline(rows){
  const groups={};
  rows.forEach(x=>{
    const key=x.countryId+'__'+checkinMonthKey(x);
    if(!groups[key])groups[key]={key,countryId:x.countryId,country:x.country,continent:x.continent,date:x.date,label:checkinMonthLabel(x),items:[]};
    groups[key].items.push(x);
  });
  let arr=Object.values(groups);
  arr.sort((a,b)=>{
    if(a.date&&b.date)return b.date.localeCompare(a.date);
    if(a.date&&!b.date)return -1;
    if(!a.date&&b.date)return 1;
    return (a.continent+a.country).localeCompare(b.continent+b.country,'zh-Hans-CN');
  });
  const shown=checkinShowAll?arr:arr.slice(0,3);
  let h='';
  shown.forEach(g=>{
    const open=!!expandedCheckinGroups[g.key];
    h+=`<div class="checkin-country-row ${open?'open':''}" onclick="toggleCheckinGroup('${g.key}',event)">
      <div class="checkin-country-main">
        <div>
          <div class="checkin-country-name">${e(g.country)}</div>
          <div class="tl-date">${e(g.label)} · ${e(g.continent)}</div>
        </div>
        <span class="checkin-count-badge">${g.items.length} 处地区</span>
      </div>
      <div class="checkin-places">
        ${g.items.map(x=>`<button class="checkin-city" onclick="openVisitedPlace('${x.countryId}','${x.placeId}')">${e(x.name)}</button>`).join('')}
      </div>
    </div>`;
  });
  if(arr.length>3){
    h+=`<button class="checkin-more" onclick="toggleCheckinAll()">${checkinShowAll?'只显示近期 3 个':'查看全部 '+arr.length+' 条国家记录'}</button>`;
  }
  return h;
}
function renderPlaceTimeline(rows){
  const shown=checkinShowAll?rows:rows.slice(0,3);
  let h='';
  shown.forEach(x=>{
    const ds=x.date?x.date.replace('-','/'):'时间待补';
    h+=`<div class="tl-item" onclick="openVisitedPlace('${x.countryId}','${x.placeId}')" style="cursor:pointer">
      <div class="tl-dot"></div>
      <div><div class="tl-name">${e(x.name)}</div><div class="tl-date">${ds} · ${e(x.country)} · ${e(x.continent)}</div></div>
    </div>`;
  });
  if(rows.length>3){
    h+=`<button class="checkin-more" onclick="toggleCheckinAll()">${checkinShowAll?'只显示近期 3 个':'查看全部 '+rows.length+' 个地区'}</button>`;
  }
  return h;
}
function renderRegionCountries(rows){
  const grouped={};
  rows.forEach(x=>{
    const region=x.continent||'其他';
    if(!grouped[region])grouped[region]={};
    if(!grouped[region][x.countryId])grouped[region][x.countryId]={countryId:x.countryId,country:x.country,continent:x.continent,items:[]};
    grouped[region][x.countryId].items.push(x);
  });

<script>
/* ===== 修复：打卡时间保存，允许国家手动时间与城市时间共存 ===== */
function normalizeMonthValue(v){
  if(!v)return '';
  v=String(v).trim();
  // 支持 2024/6、2024.6、2024年6月、2024-6，统一转成 2024-06
  const m=v.match(/^(\d{4})[.\-/年\s]+(\d{1,2})/);
  if(m){
    const y=m[1];
    const mo=String(Math.max(1,Math.min(12,parseInt(m[2],10)))).padStart(2,'0');
    return y+'-'+mo;
  }
  if(/^\d{4}-\d{2}$/.test(v))return v;
  return v;
}

function finalSyncCountryByPlaces(c){
  if(!c)return;
  const visited=(c.places||[]).filter(p=>!!(p.visited||p.visitedDate));
  if(visited.length){
    c.status='visited';
    c.autoVisitedByPlace=true;
    const dates=visited.map(p=>p.visitedDate).filter(Boolean).sort();
    // 有城市月份就用最早城市月份；没有城市月份时，保留你手动填的国家月份，不再清掉
    if(dates.length){
      c.visitedDate=dates[0];
    }else if(!c.visitedDate && c.manualVisitedDate){
      c.visitedDate=c.manualVisitedDate;
    }
  }else if(c.status==='visited'){
    // 如果你手动把国家设为已打卡，也允许保存国家月份
    if(c.manualVisitedDate&&!c.visitedDate)c.visitedDate=c.manualVisitedDate;
  }else if(c.autoVisitedByPlace){
    c.autoVisitedByPlace=false;
    c.visitedDate=null;
    c.manualVisitedDate=null;
  }
}
syncCountryByPlaces=finalSyncCountryByPlaces;

function saveVisitedDate(){
  const c=db.countries.find(x=>x.id===cid);
  if(!c)return;
  const raw=document.getElementById('vd-input')?document.getElementById('vd-input').value:'';
  const val=normalizeMonthValue(raw);
  c.visitedDate=val||null;
  c.manualVisitedDate=val||null;
  if(val)c.status='visited';
  save();
  render();
  renderCS();
}

function setPlaceVisitedDate(){
  const c=db.countries.find(x=>x.id===cid);
  const p=c?(c.places||[]).find(x=>x.id===pid):null;
  if(!c||!p)return;
  const raw=document.getElementById('pv-input')?document.getElementById('pv-input').value:'';
  const val=normalizeMonthValue(raw);
  if(val){
    p.visited=true;
    p.visitedDate=val;
  }else{
    p.visited=false;
    p.visitedDate=null;
  }
  finalSyncCountryByPlaces(c);
  save();
  render();
  renderPS();
}

function finalNormalizeData(){
  finalApplyTaxonomy();
  if(!db.settings)db.settings={travelFund:0};
  (db.countries||[]).forEach(c=>{
    c.status=c.status==='visited'?'visited':'want';
    c.tags=(c.tags||[]).filter(t=>FINAL_TAGS_12.includes(t));
    if(!FINAL_REGIONS.includes(c.continent))c.continent='亚洲';
    if(typeof c.priority==='undefined')c.priority=0;
    if(!c.visa)c.visa='unknown';
    if(!c.budget)c.budget={flight:0,hotel:0,food:0,local:0,ticket:0,shopping:0,other:0};
    if(typeof c.spent==='undefined')c.spent=0;
    if(c.visitedDate)c.visitedDate=normalizeMonthValue(c.visitedDate);
    if(c.manualVisitedDate)c.manualVisitedDate=normalizeMonthValue(c.manualVisitedDate);
    (c.places||[]).forEach(p=>{
      p.tags=(p.tags||[]).filter(t=>FINAL_TAGS_12.includes(t));
      if(p.visitedDate)p.visitedDate=normalizeMonthValue(p.visitedDate);
      if(typeof p.visited==='undefined')p.visited=!!p.visitedDate;
      if(!p.notes)p.notes=[];
    });
    finalSyncCountryByPlaces(c);
  });
}

save();
render();
</script>


<script>
/* ===== 修复：国家打卡时间覆盖城市打卡时间 =====
   规则：
   1. 国家填写了打卡时间：统计里的城市/地区记录统一使用国家时间显示和排序。
   2. 国家没填写打卡时间：才使用城市/地区自己的打卡时间。
   3. 保存国家时间时，会给已打卡但没有城市时间的地区补上这个月份；已有城市时间不强行改，避免丢细节。
*/
function effectiveCheckinDate(c,p){
  return (c && c.visitedDate) || (p && p.visitedDate) || '';
}

function saveVisitedDate(){
  const c=db.countries.find(x=>x.id===cid);
  if(!c)return;
  const raw=document.getElementById('vd-input')?document.getElementById('vd-input').value:'';
  const val=normalizeMonthValue(raw);
  c.visitedDate=val||null;
  c.manualVisitedDate=val||null;
  if(val){
    c.status='visited';
    (c.places||[]).forEach(p=>{
      if(p.visited||p.visitedDate){
        p.visited=true;
        if(!p.visitedDate)p.visitedDate=val;
      }
    });
  }
  save();
  render();
  renderCS();
}

function finalSyncCountryByPlaces(c){
  if(!c)return;
  const visited=(c.places||[]).filter(p=>!!(p.visited||p.visitedDate));
  if(visited.length){
    c.status='visited';
    c.autoVisitedByPlace=true;
    // 国家手动时间优先，不再被城市时间覆盖。
    if(c.manualVisitedDate){
      c.visitedDate=c.manualVisitedDate;
    }else if(c.visitedDate){
      c.visitedDate=c.visitedDate;
    }else{
      const dates=visited.map(p=>p.visitedDate).filter(Boolean).sort();
      c.visitedDate=dates[0]||null;
    }
  }else if(c.status==='visited'){
    if(c.manualVisitedDate&&!c.visitedDate)c.visitedDate=c.manualVisitedDate;
  }else if(c.autoVisitedByPlace){
    c.autoVisitedByPlace=false;
    c.visitedDate=null;
    c.manualVisitedDate=null;
  }
}
syncCountryByPlaces=finalSyncCountryByPlaces;

function getVisitedCityRecords(){
  const rows=[];
  (db.countries||[]).forEach(c=>{
    (c.places||[]).forEach(p=>{
      if(p.visited||p.visitedDate){
        const d=effectiveCheckinDate(c,p);
        rows.push({
          countryId:c.id,
          placeId:p.id,
          country:c.name,
          continent:c.continent||'',
          name:p.name,
          date:d,
          cityDate:p.visitedDate||'',
          countryDate:c.visitedDate||'',
          ts:d
        });
      }
    });
  });
  rows.sort((a,b)=>{
    if(a.date&&b.date)return b.date.localeCompare(a.date);
    if(a.date&&!b.date)return -1;
    if(!a.date&&b.date)return 1;
    return (a.continent+a.country+a.name).localeCompare(b.continent+b.country+b.name,'zh-Hans-CN');
  });
  return rows;
}

function setPlaceVisitedDate(){
  const c=db.countries.find(x=>x.id===cid);
  const p=c?(c.places||[]).find(x=>x.id===pid):null;
  if(!c||!p)return;
  const raw=document.getElementById('pv-input')?document.getElementById('pv-input').value:'';
  const val=normalizeMonthValue(raw);
  if(val){
    p.visited=true;
    p.visitedDate=val;
  }else{
    p.visited=false;
    p.visitedDate=null;
  }
  finalSyncCountryByPlaces(c);
  save();
  render();
  renderPS();
}

function renderPS(){
  const c=db.countries.find(x=>x.id===cid);const p=c?c.places.find(x=>x.id===pid):null;if(!c||!p)return;
  const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm" style="font-size:11px;padding:2px 7px">${MA[m-1]}</span>`).join('');
  const ptags=(p.tags||[]).map(t=>`<span class="ptc" style="font-size:11px;padding:2px 8px">${e(t)}</span>`).join('');
  const tabs=NC.map(cat=>`<button class="nt${cat===ncat?' act':''}" onclick="swC('${cat}')">${cat}</button>`).join('');
  const notes=(p.notes||[]).filter(n=>n.cat===ncat);
  const done=isPlaceVisited(p);
  const effectiveDate=effectiveCheckinDate(c,p);
  const nh=notes.length?notes.map(n=>{
    const gi=(p.notes||[]).indexOf(n);
    const d=new Date(n.ts);const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
    const imgs=(n.images||[]).map((img,ii)=>`<img class="nimg" src="${img}" onclick="openLB('${gi}',${ii})" title="点击放大">`).join('');
    return `<div class="nitem"><div class="ntext">${e(n.text)}</div>${imgs?`<div class="nimgs">${imgs}</div>`:''}<div class="nts">${ds}</div><button class="ndel" onclick="delN(${gi})">×</button></div>`;
  }).join(''):'<div class="nonotes">这个分类还没有内容</div>';

  document.getElementById('si2').innerHTML=`
    <button class="backbtn" onclick="renderCS()">← ${e(c.name)}</button>
    <div class="pdname" title="${e(p.name)}">${e(p.name)}</div>
    <div class="place-status-line">
      <button class="place-check big ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡这个城市'}</button>
      <div class="place-date-editor">
        <span class="place-visited-date">${done?'显示时间':'自定义城市时间'}</span>
        <input type="month" id="pv-input" value="${p.visitedDate||''}">
        <button onclick="setPlaceVisitedDate()">保存</button>
      </div>
      ${effectiveDate?`<span class="place-visited-date">统计按：${effectiveDate.replace('-','/')}${c.visitedDate?'（国家时间）':''}</span>`:''}
    </div>
    <div class="pdmonths">${mh}</div>
    ${ptags?`<div class="pdtags">${ptags}</div>`:''}
    ${p.season?`<div class="pdseason">${e(p.season)}</div>`:''}
    <div class="ntabs">${tabs}</div>
    <div id="nlist">${nh}</div>
    <div class="anw">
      <textarea class="anta" id="nta" placeholder="添加${ncat}备注…"></textarea>
      <div id="img-previews" class="img-preview"></div>
      <div class="an-actions">
        <button class="anbtn" onclick="subN()">+ 添加</button>
        <button class="imgbtn" onclick="document.getElementById('img-input').click()">🖼 图片</button>
      </div>
    </div>
    <div class="sdivider"></div>
    <div class="s2btns"><button class="editbtn" onclick="openEditP()">✎ 编辑景点</button><button class="delbtn" onclick="delP()">删除</button></div>`;
  pendingImgs=[];
}

save();
render();
</script>
