<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Travel Atlas · Desktop Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,'Noto Serif SC',serif;background:#f5f0e8;color:#2c2416;min-height:100vh;}
mark{background:#f0d080;color:#2c2416;border-radius:2px;padding:0 1px;}

/* Header */
.hdr{background:#2c2416;color:#f5f0e8;padding:14px 14px 10px;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:11px;}
.eyebrow{font-size:9px;letter-spacing:4px;opacity:.35;text-transform:uppercase;margin-bottom:3px;}
.title{font-size:17px;font-weight:400;}
.sub{font-size:10px;opacity:.26;margin-top:2px;}
.hdr-btns{display:flex;gap:6px;}
.btn-add{padding:6px 12px;background:#c9a96e;border:none;color:#2c2416;border-radius:2px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;}
.btn-export{padding:6px 10px;background:rgba(201,169,110,.14);border:1px solid rgba(201,169,110,.3);color:#c9a96e;border-radius:2px;cursor:pointer;font-size:11px;font-family:inherit;}
.hdr-row2{display:flex;gap:5px;align-items:center;margin-bottom:9px;}
.sw{flex:1;position:relative;}
.si{width:100%;padding:6px 10px 6px 24px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:20px;color:#f5f0e8;font-size:12px;font-family:inherit;outline:none;}
.si::placeholder{color:rgba(255,255,255,.22);}
.sico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:rgba(201,169,110,.5);font-size:12px;pointer-events:none;}
.vb{padding:5px 9px;border:1px solid rgba(255,255,255,.13);background:transparent;color:rgba(255,255,255,.48);border-radius:2px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;}
.vb.act{border-color:#c9a96e;background:rgba(201,169,110,.18);color:#c9a96e;}
.hdr-row3{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.sfb{padding:4px 9px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.45);border-radius:2px;cursor:pointer;font-size:11px;font-family:inherit;}
.sfb.act{border-color:#c9a96e;background:rgba(201,169,110,.18);color:#c9a96e;}
.ftbtn{margin-left:auto;padding:4px 9px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.4);border-radius:2px;cursor:pointer;font-size:11px;font-family:inherit;}
.ftbtn.has{border-color:rgba(201,169,110,.45);color:#c9a96e;}

/* Filter drawer */
.fdrw{background:#1a1208;overflow:hidden;max-height:0;transition:max-height .3s ease;}
.fdrw.open{max-height:380px;}
.fdi{padding:11px 14px 13px;}
.fds{margin-bottom:10px;}
.fdl{font-size:9px;letter-spacing:2.5px;color:rgba(201,169,110,.48);text-transform:uppercase;margin-bottom:5px;}
.pills{display:flex;flex-wrap:wrap;gap:4px;}
.pill{padding:4px 9px;border:1px solid rgba(255,255,255,.11);background:transparent;color:rgba(255,255,255,.42);border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;}
.pill.act{border-color:#c9a96e;background:rgba(201,169,110,.2);color:#c9a96e;}
.pill.mp{min-width:34px;text-align:center;padding:4px 6px;}
.clr{font-size:11px;color:rgba(201,169,110,.45);cursor:pointer;background:none;border:none;font-family:inherit;margin-top:3px;}

/* Body */
.body{padding:15px 14px;}
.sec{margin-bottom:22px;}
.sec-hdr{font-size:10px;letter-spacing:3px;color:#8a7a5a;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #d4c4a0;margin-bottom:10px;display:flex;justify-content:space-between;}
.sec-cnt{opacity:.45;}

/* Country card */
.cc{background:#fff;border:1px solid #d4c4a0;border-radius:5px;margin-bottom:7px;overflow:hidden;}
.cc-hdr{padding:10px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;}
.cc:hover .cc-hdr{background:#fdfaf4;}
.cc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cc-dot.want{background:#c9a96e;}
.cc-dot.visited{background:#7ab87a;}
.cc-dot.none{background:rgba(44,36,22,.18);}
.cc-name{font-size:14px;font-weight:600;flex:1;}
.cc-tags{display:flex;gap:3px;flex-wrap:wrap;}
.tc{font-size:9px;padding:1px 5px;background:#f0e8d0;border-radius:10px;color:#6a5a3a;}
.cc-badges{display:flex;gap:4px;align-items:center;margin-left:auto;flex-shrink:0;}
.badge-date{font-size:9px;padding:1px 6px;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.25);border-radius:10px;color:#a08050;}
.badge-visited{font-size:9px;padding:1px 6px;background:rgba(122,184,122,.12);border:1px solid rgba(122,184,122,.25);border-radius:10px;color:#5a9a5a;}
.cc-info{font-size:10px;color:#b0a080;white-space:nowrap;}
.cc-arr{font-size:13px;color:#c8b890;margin-left:3px;transition:transform .2s;flex-shrink:0;}
.cc.open .cc-arr{transform:rotate(90deg);}
.cc-body{display:none;border-top:1px solid #f5eede;}
.cc.open .cc-body{display:block;}
.cc-actions{padding:6px 12px 8px;display:flex;gap:6px;border-bottom:1px solid #f5eede;}
.cc-act-btn{flex:1;padding:6px;border:1px solid #d4c4a0;background:transparent;color:#6a5a3a;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;}
.cc-act-btn.del{border-color:rgba(180,60,60,.18);color:rgba(180,60,60,.4);}
.plist{}
.pr{padding:9px 12px 9px 26px;border-bottom:1px solid #f8f2ea;cursor:pointer;}
.pr:last-child{border-bottom:none;}
.pr:hover{background:#faf5ed;}
.pr-name{font-size:13px;}
.pr-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.pr-months{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.pm{font-size:9px;padding:1px 5px;background:#2c2416;color:#c9a96e;border-radius:2px;}
.ptc{font-size:9px;padding:1px 5px;background:#e8f0e8;border-radius:10px;color:#4a7a4a;}
.pr-prev{font-size:11px;color:#a08060;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:95%;}
.apr{padding:8px 12px 8px 26px;font-size:12px;color:rgba(201,169,110,.5);cursor:pointer;display:flex;align-items:center;gap:4px;}
.apr:hover{color:#c9a96e;}

/* Circuit view */
.circ-sec{margin-bottom:22px;}
.circ-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.circ-name{font-size:11px;font-weight:600;letter-spacing:1px;color:#6a5a3a;}
.circ-days-total{font-size:10px;color:#a08060;}
.circ-items{display:flex;flex-direction:column;gap:6px;}
.circ-item{background:#fff;border:1px solid #d4c4a0;border-radius:5px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;}
.circ-item:hover{border-color:#c9a96e;}
.circ-order{width:20px;height:20px;border-radius:50%;background:#2c2416;color:#c9a96e;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;}
.circ-item-body{flex:1;}
.circ-item-name{font-size:14px;font-weight:600;}
.circ-item-meta{font-size:11px;color:#8a7a5a;margin-top:2px;}
.circ-item-days{font-size:11px;color:#c9a96e;font-weight:600;white-space:nowrap;}
.circ-reorder{display:flex;flex-direction:column;gap:2px;}
.circ-reorder button{background:none;border:1px solid #e0d4c0;color:#a08060;cursor:pointer;font-size:10px;padding:1px 5px;border-radius:2px;font-family:inherit;}
.circ-reorder button:hover{border-color:#c9a96e;color:#c9a96e;}

/* Month grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;}
.mcard{background:#fff;border:1px solid #d4c4a0;border-radius:4px;overflow:hidden;}
.mcard-hdr{padding:7px 12px;background:#2c2416;color:#c9a96e;display:flex;justify-content:space-between;}
.mcard-hdr span{font-size:12px;font-weight:600;}
.mcard-hdr small{font-size:10px;opacity:.5;}
.mempty{padding:10px;font-size:11px;color:#b0a080;text-align:center;}
.mpr{padding:8px 12px;border-bottom:1px solid #f5eedf;cursor:pointer;}
.mpr:last-child{border-bottom:none;}
.mpr:hover{background:#faf5ed;}
.mpr-name{font-size:13px;}
.mpr-country{font-size:10px;color:#8a7a5a;margin-top:1px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:#fff;border:1px solid #d4c4a0;border-radius:5px;padding:14px 16px;}
.stat-num{font-size:28px;font-weight:400;color:#2c2416;line-height:1;}
.stat-sub{font-size:11px;color:#8a7a5a;margin-top:4px;}
.stat-detail{font-size:10px;color:#b0a080;margin-top:3px;}
.cont-bars{background:#fff;border:1px solid #d4c4a0;border-radius:5px;padding:14px 16px;margin-bottom:10px;}
.cont-bar-row{margin-bottom:8px;}
.cont-bar-label{display:flex;justify-content:space-between;font-size:11px;color:#6a5a3a;margin-bottom:3px;}
.cont-bar-track{height:5px;background:#f0e8d0;border-radius:3px;overflow:hidden;}
.cont-bar-fill{height:100%;background:#c9a96e;border-radius:3px;transition:width .4s ease;}
.cont-bar-fill.visited{background:#7ab87a;}
.timeline{background:#fff;border:1px solid #d4c4a0;border-radius:5px;padding:14px 16px;}
.tl-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:#7ab87a;flex-shrink:0;margin-top:4px;}
.tl-name{font-size:13px;font-weight:600;}
.tl-date{font-size:11px;color:#8a7a5a;}

/* Sheet */
.ov{position:fixed;inset:0;background:transparent;z-index:100;pointer-events:none;transition:background .2s;}
.ov.open{background:rgba(0,0,0,.42);pointer-events:all;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(105%);width:100%;max-width:540px;background:#f5f0e8;border-radius:14px 14px 0 0;max-height:90vh;overflow-y:auto;transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:101;}
.sheet.open{transform:translateX(-50%) translateY(0);}
.shdl{width:36px;height:3px;background:#d4c4a0;border-radius:2px;margin:12px auto 0;}
.si2{padding:14px 15px 44px;}
.cs-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.cs-eye{font-size:9px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:2px;}
.cs-name{font-size:20px;font-weight:400;}
.sclose{background:none;border:none;cursor:pointer;font-size:22px;color:#a08060;font-family:inherit;padding:0 4px;}
.sr{display:flex;gap:6px;margin-bottom:14px;}
.sb{flex:1;padding:7px 4px;border:1px solid;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;text-align:center;transition:all .12s;}
.sb-want{border-color:rgba(201,169,110,.3);background:transparent;color:rgba(201,169,110,.6);}
.sb-visited{border-color:rgba(122,184,122,.3);background:transparent;color:rgba(122,184,122,.6);}
.sb-none{border-color:rgba(44,36,22,.12);background:transparent;color:rgba(44,36,22,.3);}
.sb.act.sb-want{background:#c9a96e;border-color:#c9a96e;color:#2c2416;font-weight:700;}
.sb.act.sb-visited{background:#7ab87a;border-color:#7ab87a;color:#2c2416;font-weight:700;}
.sb.act.sb-none{background:rgba(44,36,22,.1);border-color:rgba(44,36,22,.2);color:#2c2416;}
.visited-date-row{background:rgba(122,184,122,.08);border:1px solid rgba(122,184,122,.2);border-radius:4px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;display:none;}
.visited-date-row.show{display:flex;}
.visited-date-row label{font-size:11px;color:#5a9a5a;white-space:nowrap;}
.visited-date-input{padding:4px 8px;border:1px solid rgba(122,184,122,.3);background:#fff;border-radius:3px;color:#2c2416;font-size:12px;font-family:inherit;outline:none;}
.visited-date-save{padding:4px 10px;background:#7ab87a;border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;}
.slbl{font-size:9px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:8px;}
.pi2{background:#fff;border:1px solid #e0d4bc;border-radius:4px;padding:10px 12px;margin-bottom:6px;cursor:pointer;}
.pi2:hover{border-color:#c9a96e;}
.pi2-name{font-size:14px;}
.pi2-prev{font-size:11px;color:#a08060;margin-top:2px;}
.apbtn{width:100%;padding:10px;border:1px dashed rgba(201,169,110,.28);background:transparent;color:rgba(201,169,110,.5);border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;margin-top:2px;}
.sdivider{height:1px;background:#e8dcc8;margin:11px 0;}
.s2btns{display:flex;gap:7px;}
.delbtn{flex:1;padding:8px;border:1px solid rgba(180,60,60,.15);background:transparent;color:rgba(180,60,60,.38);border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;}
.editbtn{flex:1;padding:8px;border:1px solid #d4c4a0;background:transparent;color:#6a5a3a;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;}
.backbtn{background:none;border:none;color:#a08060;cursor:pointer;font-size:11px;font-family:inherit;padding:0;margin-bottom:11px;display:flex;align-items:center;gap:3px;}
.pdname{font-size:18px;font-weight:400;margin-bottom:4px;}
.pdmonths{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px;}
.pdtags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.pdseason{font-size:12px;color:#8a7a5a;line-height:1.6;margin-bottom:12px;}
.ntabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.nt{padding:4px 10px;border:1px solid #d8cdb0;background:transparent;color:#8a7a5a;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;}
.nt.act{border-color:#2c2416;background:#2c2416;color:#c9a96e;}
.nitem{background:#fff;border:1px solid #e8dcc8;border-radius:4px;padding:9px 11px;margin-bottom:6px;position:relative;}
.ntext{font-size:13px;line-height:1.65;color:#3a2c1a;white-space:pre-wrap;padding-right:20px;}
.nts{font-size:9px;color:#b0a070;margin-top:3px;}
.ndel{position:absolute;top:7px;right:7px;background:none;border:none;cursor:pointer;color:#c8b890;font-size:14px;}
.nimgs{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.nimg{width:60px;height:60px;object-fit:cover;border-radius:3px;cursor:pointer;border:1px solid #e0d4c0;}
.nonotes{text-align:center;color:#b0a080;padding:14px 0;font-size:12px;}
.anw{margin-top:10px;}
.anta{width:100%;padding:9px 11px;background:#fff;border:1px solid #d4c4a0;border-radius:4px;color:#2c2416;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:65px;}
.anta::placeholder{color:#b0a080;}
.an-actions{display:flex;gap:7px;margin-top:6px;align-items:center;}
.anbtn{padding:8px 16px;background:#2c2416;border:none;color:#c9a96e;border-radius:3px;cursor:pointer;font-size:12px;font-family:inherit;}
.imgbtn{padding:8px 12px;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);color:#a08050;border-radius:3px;cursor:pointer;font-size:12px;font-family:inherit;}
.img-preview{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.img-preview-item{position:relative;}
.img-preview-item img{width:55px;height:55px;object-fit:cover;border-radius:3px;border:1px solid #e0d4c0;}
.img-preview-item button{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#c06060;border:none;color:#fff;cursor:pointer;font-size:9px;line-height:14px;text-align:center;padding:0;}

/* Modals */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mov.open{display:flex;}
.modal{background:#f5f0e8;width:100%;max-width:480px;border-radius:14px 14px 0 0;padding:16px 15px 44px;max-height:92vh;overflow-y:auto;}
.mhdl{width:36px;height:3px;background:#d4c4a0;border-radius:2px;margin:0 auto 14px;}
.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.mtitle{font-size:14px;font-weight:600;}
.mclose{background:none;border:none;cursor:pointer;font-size:20px;color:#a08060;font-family:inherit;}
.fg{margin-bottom:11px;}
.fl{font-size:9px;letter-spacing:1.5px;color:#8a7a5a;text-transform:uppercase;display:block;margin-bottom:4px;}
.fi{width:100%;padding:8px 11px;background:#fff;border:1px solid #d4c4a0;border-radius:3px;color:#2c2416;font-size:13px;font-family:inherit;outline:none;}
.fi::placeholder{color:#b0a080;}
.fsel{width:100%;padding:8px 11px;background:#fff;border:1px solid #d4c4a0;border-radius:3px;color:#2c2416;font-size:13px;font-family:inherit;outline:none;}
.tsel{display:flex;flex-wrap:wrap;gap:4px;}
.tsb{padding:4px 9px;border:1px solid #d4c4a0;background:#fff;color:#6a5a3a;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;}
.tsb.sel{border-color:#2c2416;background:#2c2416;color:#c9a96e;}
.mbtns{display:flex;flex-wrap:wrap;gap:4px;}
.mb{padding:4px 8px;border:1px solid #d4c4a0;background:#fff;color:#6a5a3a;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;}
.mb.sel{border-color:#2c2416;background:#2c2416;color:#c9a96e;}
.fact{display:flex;gap:7px;margin-top:14px;}
.fcancel{flex:1;padding:10px;border:1px solid #d4c4a0;background:transparent;color:#8a7a5a;border-radius:3px;cursor:pointer;font-size:13px;font-family:inherit;}
.fsub{flex:2;padding:10px;border:none;background:#2c2416;color:#c9a96e;border-radius:3px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700;}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:94vw;max-height:88vh;border-radius:4px;}
.lb-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;}

.empty-state{text-align:center;color:#b0a080;padding:50px 0;font-size:14px;line-height:1.8;}

/* ===== Desktop Edition by 小辰：电脑端优化，不再迁就手机预览 ===== */
:root{
  --ink:#2c2416;
  --ink-2:#493820;
  --muted:#8a7a5a;
  --paper:#f6efe3;
  --paper-light:#fffaf1;
  --paper-warm:#efe2c8;
  --gold:#c9a96e;
  --gold-2:#b08a4a;
  --line:#d8c7a4;
  --green:#72aa72;
  --danger:#b45a4f;
  --shadow:0 14px 38px rgba(44,36,22,.10);
  --shadow-soft:0 7px 20px rgba(44,36,22,.07);
}
html{
  background:
    radial-gradient(circle at 8% 8%,rgba(201,169,110,.18),transparent 28%),
    radial-gradient(circle at 86% 0%,rgba(44,36,22,.10),transparent 30%),
    linear-gradient(180deg,#efe2cc 0%,#f8f0e2 50%,#ead9bd 100%);
}
body{
  max-width:none;
  min-height:100vh;
  background:
    linear-gradient(rgba(255,250,241,.52),rgba(255,250,241,.52)),
    repeating-linear-gradient(90deg,rgba(44,36,22,.018) 0,rgba(44,36,22,.018) 1px,transparent 1px,transparent 44px),
    #f6efe3;
  color:var(--ink);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(44,36,22,.05) 1px,transparent 1px),
    linear-gradient(180deg,rgba(44,36,22,.035) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(180deg,rgba(0,0,0,.48),transparent 72%);
}
.hdr{
  position:sticky;
  top:0;
  z-index:80;
  padding:26px 40px 18px;
  background:
    radial-gradient(circle at 16% 0%,rgba(201,169,110,.20),transparent 32%),
    radial-gradient(circle at 88% 20%,rgba(201,169,110,.10),transparent 26%),
    linear-gradient(145deg,#342718 0%,#21180f 74%);
  border-bottom:1px solid rgba(201,169,110,.25);
  box-shadow:0 12px 36px rgba(44,36,22,.23);
}
.hdr::after{
  content:"";
  display:block;
  max-width:1200px;
  margin:18px auto 0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,.62),transparent);
}
.hdr-top,.hdr-row2,.hdr-row3{
  max-width:1200px;
  margin-left:auto;
  margin-right:auto;
}

<script>
const MA=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const NC=['通用','美食','购物','户外','住宿','交通','其他'];
const CO=['亚洲','欧洲','非洲','北美洲','中美洲','加勒比海','南美洲','大洋洲','太平洋岛国','印度洋','南极洲'];
const AT=['海岛','海滩','城市','古迹遗址','自然风光','户外徒步','雪山高原','沙漠','丛林','温泉','美食','购物','艺术博物馆','建筑','节庆','人文历史'];

let db={countries:[]};
let cid=null,pid=null,ncat='通用';
let fst='all',ftags=[],fmonths=[],fcirc=null,view='continent',sq='';
let editingCId=null,editingPId=null,apForId=null;
let pendingImgs=[];

const SAMPLE=[{id:'gt',name:'危地马拉',continent:'中美洲',circuit:'中美洲',circuitOrder:1,circuitDays:10,status:'want',tags:['古迹遗址','丛林','人文历史'],plannedDate:'2025-11',visitedDate:null,places:[
  {id:'tikal',name:'提卡尔 Tikal',bestMonths:[11,12,1,2,3],season:'旱季11月-4月，丛林清朗，淡季人少。',tags:['古迹遗址','丛林'],notes:[
    {cat:'通用',text:'UNESCO遗址，凌晨4点入园看日出从神庙顶升起。',ts:Date.now()-86400000,images:[]},
    {cat:'户外',text:'丛林徒步注意防蚊，雨季路滑。',ts:Date.now()-80000000,images:[]}
  ]},
  {id:'flores',name:'花地玛 Flores',bestMonths:[11,12,1,2,3],season:'旱季为佳',tags:['城市','海滩'],notes:[
    {cat:'通用',text:'提卡尔大本营，湖中小岛古城，住湖边看日落。',ts:Date.now()-80000000,images:[]},
    {cat:'住宿',text:'湖边小旅馆性价比高，提前订。',ts:Date.now()-70000000,images:[]}
  ]}
]}];

function save(){try{localStorage.setItem('ta-v6',JSON.stringify(db));}catch(e){}try{if(window.storage)window.storage.set('ta-v6',JSON.stringify(db));}catch(e){}}
function load(){try{const d=localStorage.getItem('ta-v6');if(d){const p=JSON.parse(d);if(p&&Array.isArray(p.countries)&&p.countries.length){db=p;return;}}}catch(e){}db={countries:JSON.parse(JSON.stringify(SAMPLE))};}
load();

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='travel-atlas-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}

// ---- FILTER UI ----
function buildFUI(){
  document.getElementById('tag-pills').innerHTML=AT.map(t=>`<button class="pill${ftags.includes(t)?' act':''}" onclick="tTag('${t}')">${t}</button>`).join('');
  document.getElementById('month-pills').innerHTML=MA.map((m,i)=>`<button class="pill mp${fmonths.includes(i+1)?' act':''}" onclick="tMonth(${i+1})">${m}</button>`).join('');
  const circs=[...new Set(db.countries.map(c=>c.circuit).filter(Boolean))];
  const cs=document.getElementById('circuit-sec');
  if(circs.length){cs.style.display='';document.getElementById('circuit-pills').innerHTML=circs.map(c=>`<button class="pill${fcirc===c?' act':''}" onclick="tCirc('${c}')">${e(c)}</button>`).join('');}
  else cs.style.display='none';
  const has=ftags.length||fmonths.length||fcirc;
  document.getElementById('ftbtn').classList.toggle('has',!!has);
  document.getElementById('ac-tags').innerHTML=AT.map(t=>`<button class="tsb" onclick="this.classList.toggle('sel')">${t}</button>`).join('');
  document.getElementById('ap-tags').innerHTML=AT.map(t=>`<button class="tsb" onclick="this.classList.toggle('sel')">${t}</button>`).join('');
}
function tTag(t){ftags=ftags.includes(t)?ftags.filter(x=>x!==t):[...ftags,t];
function importData(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const p=JSON.parse(reader.result);
      if(!p||!Array.isArray(p.countries))throw new Error('bad format');
      db=p;
      save();
      buildFUI();
      render();
      closeSheet();
      alert('导入成功。');
    }catch(err){
      alert('这个文件读不了，确认一下是不是 Travel Atlas 导出的 JSON。');
    }finally{
      input.value='';
    }
  };
  reader.readAsText(file,'utf-8');
}

buildFUI();render();}
function tMonth(m){fmonths=fmonths.includes(m)?fmonths.filter(x=>x!==m):[...fmonths,m];buildFUI();render();}
function tCirc(c){fcirc=fcirc===c?null:c;buildFUI();render();}
function clearF(){ftags=[];fmonths=[];fcirc=null;buildFUI();render();}
function toggleDrawer(){document.getElementById('fdrw').classList.toggle('open');}

// ---- FILTER ----
function cmf(c){
  if(fst!=='all'&&c.status!==fst)return false;
  if(fcirc&&c.circuit!==fcirc)return false;
  if(ftags.length){
    const ctags=c.tags||[];
    const ptags=c.places.flatMap(p=>p.tags||[]);
    if(!ftags.every(t=>ctags.includes(t)||ptags.includes(t)))return false;
  }
  if(fmonths.length&&!c.places.some(p=>(p.bestMonths||[]).some(m=>fmonths.includes(m))))return false;
  if(sq){const t=sq.toLowerCase();if(![c.name,(c.circuit||''),...(c.tags||[]),...c.places.flatMap(p=>[p.name,...(p.tags||[])])].some(s=>s.toLowerCase().includes(t)))return false;}
  return true;
}
function getF(){return db.countries.filter(cmf);}

// ---- HIGHLIGHT ----
function hl(text){
  if(!sq||!text)return e(text);
  const re=new RegExp('('+sq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return e(text).replace(re,'<mark>$1</mark>');
}

// ---- RENDER ----
function render(){
  const f=getF();
  const w=db.countries.filter(c=>c.status==='want').length,v=db.countries.filter(c=>c.status==='visited').length;
  document.getElementById('sub').textContent=`${db.countries.length} 处 · 想去 ${w} · 打卡 ${v}`;
  const body=document.getElementById('body');
  if(view==='stats'){renderStats(body);return;}
  if(!f.length){body.innerHTML='<div class="empty-state">没有符合的目的地</div>';return;}
  if(view==='continent')rContinent(f,body);
  else if(view==='circuit')rCircuit(f,body);
  else rMonth(f,body);
}

function rContinent(f,body){
  const byC={};f.forEach(c=>{const k=c.continent||'其他';if(!byC[k])byC[k]=[];byC[k].push(c);});
  let h='';
  [...CO,'其他'].forEach(cont=>{
    const cs=byC[cont];if(!cs||!cs.length)return;
    h+=`<div class="sec"><div class="sec-hdr"><span>${cont}</span><span class="sec-cnt">${cs.length} 处</span></div>`;
    cs.forEach(c=>h+=ccH(c));h+=`</div>`;
  });
  body.innerHTML=h;
}

function rCircuit(f,body){
  const circs={};f.forEach(c=>{if(c.circuit){if(!circs[c.circuit])circs[c.circuit]=[];circs[c.circuit].push(c);}});
  const keys=Object.keys(circs).sort();
  if(!keys.length){body.innerHTML='<div class="empty-state">还没有自定义环线<br><span style="font-size:12px;opacity:.6">添加目的地时填写「环线」字段即可</span></div>';return;}
  let h='';
  keys.forEach(cn=>{
    const members=circs[cn].slice().sort((a,b)=>(a.circuitOrder||99)-(b.circuitOrder||99));
    const totalDays=members.reduce((s,c)=>s+(c.circuitDays||0),0);
    h+=`<div class="sec"><div class="circ-meta"><span class="circ-name">✦ ${e(cn)}</span>${totalDays?`<span class="circ-days-total">共约 ${totalDays} 天</span>`:''}</div><div class="circ-items">`;
    members.forEach((c,i)=>{
      const tags=(c.tags||[]).map(t=>`<span class="tc">${e(t)}</span>`).join('');
      h+=`<div class="circ-item" onclick="cid='${c.id}';renderCS();openSheet()">
        <div class="circ-order">${c.circuitOrder||i+1}</div>
        <div class="circ-item-body"><div class="circ-item-name">${hl(c.name)}</div><div class="circ-item-meta">${e(c.continent||'')} ${tags}</div></div>
        ${c.circuitDays?`<div class="circ-item-days">${c.circuitDays}天</div>`:''}
        <div class="circ-reorder">
          <button onclick="event.stopPropagation();moveCircuit('${c.id}',-1)">▲</button>
          <button onclick="event.stopPropagation();moveCircuit('${c.id}',1)">▼</button>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  body.innerHTML=h;
}

function moveCircuit(id,dir){
  const c=db.countries.find(x=>x.id===id);if(!c||!c.circuit)return;
  const members=db.countries.filter(x=>x.circuit===c.circuit).sort((a,b)=>(a.circuitOrder||99)-(b.circuitOrder||99));
  const idx=members.indexOf(c);const newIdx=idx+dir;
  if(newIdx<0||newIdx>=members.length)return;
  const tmp=members[newIdx].circuitOrder||newIdx+1;
  members[newIdx].circuitOrder=members[idx].circuitOrder||idx+1;
  members[idx].circuitOrder=tmp;
  save();render();
}

function rMonth(f,body){
  let h='<div class="mgrid">';
  for(let m=1;m<=12;m++){
    const places=[];f.forEach(c=>c.places.forEach(p=>{if((p.bestMonths||[]).includes(m))places.push({p,c});}));
    h+=`<div class="mcard"><div class="mcard-hdr"><span>${MA[m-1]}</span><small>${places.length}</small></div>`;
    if(!places.length)h+='<div class="mempty">暂无</div>';
    else places.forEach(({p,c})=>h+=`<div class="mpr" onclick="openPD('${c.id}','${p.id}')"><div class="mpr-name">${hl(p.name)}</div><div class="mpr-country">${hl(c.name)}</div></div>`);
    h+=`</div>`;
  }
  body.innerHTML=h+'</div>';
}

function renderStats(body){
  const all=db.countries;
  const visited=all.filter(c=>c.status==='visited');
  const want=all.filter(c=>c.status==='want');
  const allPlaces=all.flatMap(c=>c.places);
  const visitedPlaces=visited.flatMap(c=>c.places);
  const allNotes=allPlaces.flatMap(p=>p.notes||[]);
  const visitedConts=[...new Set(visited.map(c=>c.continent).filter(Boolean))];
  const allConts=[...new Set(all.map(c=>c.continent).filter(Boolean))];
  const totalImgs=allNotes.reduce((s,n)=>s+(n.images||[]).length,0);

  let h=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${visited.length}</div><div class="stat-sub">已打卡国家/地区</div><div class="stat-detail">共 ${all.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${visitedConts.length}</div><div class="stat-sub">到访大洲/大洋</div><div class="stat-detail">共 ${allConts.length} 个在计划中</div></div>
    <div class="stat-card"><div class="stat-num">${visitedPlaces.length}</div><div class="stat-sub">打卡城市/景点</div><div class="stat-detail">共 ${allPlaces.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${allNotes.length}</div><div class="stat-sub">条备注</div><div class="stat-detail">${totalImgs} 张图片</div></div>
  </div>`;

  if(allConts.length){
    h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>大洲覆盖</span></div>`;
    CO.forEach(cont=>{
      const total=all.filter(c=>c.continent===cont).length;
      const vis=visited.filter(c=>c.continent===cont).length;
      if(!total)return;
      const pct=Math.round(vis/total*100);
      h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${cont}</span><span>${vis}/${total}</span></div><div class="cont-bar-track"><div class="cont-bar-fill${vis?'':' none'}" style="width:${pct}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  const timeline=visited.filter(c=>c.visitedDate).sort((a,b)=>b.visitedDate.localeCompare(a.visitedDate));
  if(timeline.length){
    h+=`<div class="timeline"><div class="sec-hdr" style="margin-bottom:12px"><span>打卡记录</span></div>`;
    timeline.forEach(c=>{
      const d=c.visitedDate;const [y,m]=d.split('-');
      h+=`<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-name">${e(c.name)}</div><div class="tl-date">${y}年${m?parseInt(m)+'月':''} · ${e(c.continent||'')}</div></div></div>`;
    });
    h+=`</div>`;
  }

  const planned=want.filter(c=>c.plannedDate).sort((a,b)=>a.plannedDate.localeCompare(b.plannedDate));
  if(planned.length){
    h+=`<div class="timeline" style="margin-top:10px;border-color:#d4c4a0"><div class="sec-hdr" style="margin-bottom:12px"><span>即将出发</span></div>`;
    planned.forEach(c=>{
      const d=c.plannedDate;const [y,m]=d.split('-');
      h+=`<div class="tl-item"><div class="tl-dot" style="background:#c9a96e"></div><div><div class="tl-name">${e(c.name)}</div><div class="tl-date">${y}年${m?parseInt(m)+'月':''} · ${e(c.continent||'')}</div></div></div>`;
    });
    h+=`</div>`;
  }

  body.innerHTML=h;
}

function handleImgUpload(input){
  const files=Array.from(input.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      pendingImgs.push(ev.target.result);
      const prev=document.getElementById('img-previews');
      if(prev){
        const idx=pendingImgs.length-1;
        const div=document.createElement('div');div.className='img-preview-item';
        div.innerHTML=`<img src="${ev.target.result}"><button onclick="removePendingImg(${idx},this.parentElement)">×</button>`;
        prev.appendChild(div);
      }
    };reader.readAsDataURL(file);
  });
  input.value='';
}
function removePendingImg(idx,el){pendingImgs[idx]=null;el.remove();}

function openLB(noteIdx,imgIdx){

function swC(cat){ncat=cat;renderPS();}
function subN(){

  if(!txt&&!imgs.length)return;
  const c=db.countries.find(x=>x.id===cid);const p=c.places.find(x=>x.id===pid);
  if(!p.notes)p.notes=[];
  p.notes.push({cat:ncat,text:txt,ts:Date.now(),images:imgs});
  save();renderPS();
}
function delN(i){const c=db.countries.find(x=>x.id===cid);const p=c.places.find(x=>x.id===pid);p.notes.splice(i,1);save();renderPS();}

function delC(){const c=db.countries.find(x=>x.id===cid);if(!c||!confirm('删除 '+c.name+'？'))return;db.countries=db.countries.filter(x=>x.id!==cid);save();render();buildFUI();closeSheet();}

  document.getElementById('ac-days').value=c.circuitDays||'';
  document.getElementById('ac-status').value=c.status||'want';
  document.getElementById('ac-planned').value=c.plannedDate||'';
  document.querySelectorAll('#ac-tags .tsb').forEach(b=>b.classList.toggle('sel',(c.tags||[]).includes(b.textContent)));
  openM('mac');
}
function submitAC(){
  const name=document.getElementById('ac-name').value.trim();if(!name)return;
  const tags=Array.from(document.querySelectorAll('#ac-tags .tsb.sel')).map(b=>b.textContent);
  const order=parseInt(document.getElementById('ac-order').value)||null;
  const days=parseInt(document.getElementById('ac-days').value)||null;
  const planned=document.getElementById('ac-planned').value||null;
  if(editingCId){
    const c=db.countries.find(x=>x.id===editingCId);if(!c)return;
    c.name=name;c.continent=document.getElementById('ac-cont').value;
    c.circuit=document.getElementById('ac-circ').value.trim()||null;
    c.circuitOrder=order;c.circuitDays=days;
    c.status=document.getElementById('ac-status').value;c.tags=tags;c.plannedDate=planned;
    save();render();buildFUI();closeM('mac');if(document.getElementById('sheet').classList.contains('open'))renderCS();
  }else{
    db.countries.push({id:'c'+Date.now(),name,continent:document.getElementById('ac-cont').value,circuit:document.getElementById('ac-circ').value.trim()||null,circuitOrder:order,circuitDays:days,status:document.getElementById('ac-status').value,tags,places:[],plannedDate:planned,visitedDate:null});
    save();render();buildFUI();closeM('mac');
  }
}

// ---- ADD/EDIT PLACE ----
function openAP(ci){
  editingPId=null;apForId=ci;
  document.getElementById('map-title').textContent='添加城市 / 景点';
  document.getElementById('ap-name').value='';document.getElementById('ap-season').value='';
  document.querySelectorAll('#ap-months .mb').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('#ap-tags .tsb').forEach(b=>b.classList.remove('sel'));
  openM('map');
}
function openEditP(){
  const c=db.countries.find(x=>x.id===cid);const p=c?c.places.find(x=>x.id===pid):null;if(!c||!p)return;
  editingPId=p.id;
  document.getElementById('map-title').textContent='编辑城市 / 景点';
  document.getElementById('ap-name').value=p.name;
  document.getElementById('ap-season').value=p.season||'';
  document.querySelectorAll('#ap-months .mb').forEach(b=>b.classList.toggle('sel',(p.bestMonths||[]).includes(parseInt(b.dataset.m))));
  document.querySelectorAll('#ap-tags .tsb').forEach(b=>b.classList.toggle('sel',(p.tags||[]).includes(b.textContent)));
  openM('map');
}
function submitAP(){
  const name=document.getElementById('ap-name').value.trim();if(!name)return;
  const months=Array.from(document.querySelectorAll('#ap-months .mb.sel')).map(b=>parseInt(b.dataset.m));
  const season=document.getElementById('ap-season').value.trim();
  const tags=Array.from(document.querySelectorAll('#ap-tags .tsb.sel')).map(b=>b.textContent);
  if(editingPId){
    const c=db.countries.find(x=>x.id===cid);const p=c?c.places.find(x=>x.id===editingPId):null;if(!c||!p)return;
    p.name=name;p.bestMonths=months;p.season=season;p.tags=tags;
    save();render();closeM('map');renderPS();
  }else{
    const c=db.countries.find(x=>x.id===apForId);if(!c)return;
    c.places.push({id:'p'+Date.now(),name,bestMonths:months,season,tags,notes:[]});
    save();render();closeM('map');
    if(document.getElementById('sheet').classList.contains('open')&&cid===apForId)renderCS();
  }
}

function onSearch(v){sq=v;render();}
function setView(v,btn){view=v;document.querySelectorAll('.vb').forEach(b=>b.classList.remove('act'));btn.classList.add('act');render();}
function setSF(s,btn){fst=s;document.querySelectorAll('.sfb').forEach(b=>b.classList.remove('act'));btn.classList.add('act');render();}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

buildFUI();render();
</script>

<script>
/* ===== 城市逐个打卡：城市打卡后国家自动算打卡 ===== */
function monthNow(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function isPlaceVisited(p){
  return !!(p && (p.visited || p.visitedDate));
}
function placeVisitedCount(c){
  return (c&&c.places?c.places:[]).filter(isPlaceVisited).length;
}
function syncCountryByPlaces(c){
  if(!c)return;
  const visited=(c.places||[]).filter(isPlaceVisited);
  if(visited.length){
    c.status='visited';
    c.autoVisitedByPlace=true;
    if(!c.visitedDate){
      c.visitedDate=visited.map(p=>p.visitedDate).filter(Boolean).sort()[0]||monthNow();
    }
  }else if(c.autoVisitedByPlace){
    c.autoVisitedByPlace=false;
    if(c.status==='visited'){
      c.status='want';
      c.visitedDate=null;
    }
  }
}
function normalizeCheckins(){
  (db.countries||[]).forEach(c=>{
    (c.places||[]).forEach(p=>{
      if(p.visitedDate)p.visited=true;
      if(typeof p.visited==='undefined')p.visited=false;
    });
    syncCountryByPlaces(c);
  });
}
function togglePlaceVisit(ci,pi,ev){
  if(ev){
    ev.stopPropagation();
    ev.preventDefault();
  }
  const c=db.countries.find(x=>x.id===ci);
  const p=c?(c.places||[]).find(x=>x.id===pi):null;
  if(!c||!p)return;
  if(isPlaceVisited(p)){
    p.visited=false;
    p.visitedDate=null;
  }else{
    p.visited=true;
    p.visitedDate=monthNow();
  }
  syncCountryByPlaces(c);
  save();
  buildFUI();
  render();
  const sheet=document.getElementById('sheet');
  if(sheet&&sheet.classList.contains('open')){
    if(cid===ci&&pid===pi)renderPS();
    else if(cid===ci)renderCS();
  }
}

function render(){
  normalizeCheckins();
  const f=getF();
  const w=db.countries.filter(c=>c.status==='want').length;
  const v=db.countries.filter(c=>c.status==='visited').length;
  const pv=db.countries.reduce((s,c)=>s+placeVisitedCount(c),0);
  document.getElementById('sub').textContent=`${db.countries.length} 处 · 想去 ${w} · 打卡国家 ${v} · 打卡城市 ${pv}`;
  const body=document.getElementById('body');
  if(view==='stats'){renderStats(body);return;}
  if(!f.length){body.innerHTML='<div class="empty-state">没有符合的目的地</div>';return;}
  if(view==='continent')rContinent(f,body);
  else if(view==='circuit')rCircuit(f,body);
  else rMonth(f,body);
}

function ccH(c){
  syncCountryByPlaces(c);
  const tags=(c.tags||[]).map(t=>`<span class="tc">${hl(t)}</span>`).join('');
  const ntot=c.places.reduce((s,p)=>s+(p.notes||[]).length,0);
  const pstr=c.places.length?c.places.length+'处':'';
  const plannedBadge=c.plannedDate&&c.status==='want'?`<span class="badge-date">✈ ${c.plannedDate.replace('-','/')}</span>`:'';
  const visitedBadge=c.visitedDate?`<span class="badge-visited">✓ ${c.visitedDate.replace('-','/')}</span>`:'';
  const cityVisited=placeVisitedCount(c);
  const cityBadge=cityVisited?`<span class="city-count-badge">城市 ${cityVisited}/${c.places.length}</span>`:'';
  return `<div class="cc" id="cc-${c.id}">
    <div class="cc-hdr" onclick="toggleCC('${c.id}')">
      <div class="cc-dot ${c.status||'none'}"></div>
      <div class="cc-name" title="${e(c.name)}">${hl(c.name)}</div>
      <div class="cc-tags">${tags}</div>
      <div class="cc-badges">${plannedBadge}${visitedBadge}${cityBadge}<span class="cc-info">${pstr}${ntot?' · '+ntot+'条':''}</span></div>
      <div class="cc-arr">›</div>
    </div>
    <div class="cc-body">
      <div class="cc-actions">
        <button class="cc-act-btn" onclick="cid='${c.id}';openEditC()">✎ 编辑</button>
        <button class="cc-act-btn del" onclick="cid='${c.id}';delCDirect()">删除</button>
      </div>
      <div class="plist">${c.places.map(p=>{
        const prev=(p.notes&&p.notes.length)?p.notes[p.notes.length-1].text:'';
        const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm">${MA[m-1]}</span>`).join('');
        const ptags=(p.tags||[]).map(t=>`<span class="ptc">${hl(t)}</span>`).join('');
        const done=isPlaceVisited(p);
        return `<div class="pr" onclick="openPD('${c.id}','${p.id}')">
          <div class="pr-main">
            <div class="pr-name" title="${e(p.name)}">${hl(p.name)} ${done?'<span class="badge-place-visited">已打卡</span>':''}</div>
            <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡'}</button>
          </div>
          <div class="pr-tags">${ptags}</div>
          <div class="pr-months">${mh}</div>
          ${prev?`<div class="pr-prev">${e(prev)}</div>`:''}
        </div>`;
      }).join('')}<div class="apr" onclick="openAP('${c.id}')"><span>+</span> 添加城市或景点</div></div>
    </div>
  </div>`;
}

function renderCS(){
  const c=db.countries.find(x=>x.id===cid);if(!c)return;
  syncCountryByPlaces(c);
  const wA=c.status==='want'?'act':'',vA=c.status==='visited'?'act':'',nA=(!c.status||c.status==='none')?'act':'';
  const tags=(c.tags||[]).map(t=>`<span class="tc" style="font-size:11px;padding:2px 8px">${e(t)}</span>`).join('');
  const cityVisited=placeVisitedCount(c);
  const ph=c.places.length?c.places.map(p=>{
    const prev=(p.notes&&p.notes.length)?p.notes[p.notes.length-1].text:'';
    const ptags=(p.tags||[]).map(t=>`<span class="ptc" style="font-size:10px;padding:1px 6px">${e(t)}</span>`).join('');
    const done=isPlaceVisited(p);
    return `<div class="pi2" onclick="openPD('${c.id}','${p.id}')">
      <div class="pi2-main">
        <div style="min-width:0">
          <div class="pi2-name" title="${e(p.name)}">${e(p.name)} ${done?'<span class="badge-place-visited">已打卡</span>':''}</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${ptags}</div>
          ${prev?`<div class="pi2-prev">${e(prev)}</div>`:''}
        </div>
        <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡'}</button>
      </div>
    </div>`;
  }).join(''):'<div style="color:#b0a080;font-size:12px;padding:4px 0 8px">还没有添加景点</div>';

  const metaInfo=[];
  if(c.circuit)metaInfo.push(`环线：${e(c.circuit)}${c.circuitDays?' · '+c.circuitDays+'天':''}`);
  if(c.plannedDate&&c.status==='want')metaInfo.push(`计划出发：${c.plannedDate.replace('-','/')}`);
  if(c.visitedDate)metaInfo.push(`打卡时间：${c.visitedDate.replace('-','/')}`);
  if(c.places&&c.places.length)metaInfo.push(`城市打卡：${cityVisited}/${c.places.length}`);

  document.getElementById('si2').innerHTML=`
    <div class="cs-top">
      <div style="min-width:0">
        <div class="cs-eye">${e(c.continent||'')}</div>
        <div class="cs-name" title="${e(c.name)}">${e(c.name)}</div>
        ${metaInfo.map(m=>`<div style="font-size:11px;color:#a08060;margin-top:2px">${m}</div>`).join('')}
        ${tags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${tags}</div>`:''}
      </div>
      <button class="sclose" onclick="closeSheet()">×</button>
    </div>
    <div class="sr">
      <button class="sb sb-want ${wA}" onclick="setSt('want')">✦ 想去</button>
      <button class="sb sb-visited ${vA}" onclick="setSt('visited')">✓ 打卡</button>
      <button class="sb sb-none ${nA}" onclick="setSt('none')">待规划</button>
    </div>
    <div class="visited-date-row${c.status==='visited'?' show':''}" id="vd-row">
      <label>国家打卡时间</label>
      <input class="visited-date-input" type="month" id="vd-input" value="${c.visitedDate||''}">
      <button class="visited-date-save" onclick="saveVisitedDate()">保存</button>
    </div>
    <div class="slbl">城市 / 景点</div>${ph}
    <button class="apbtn" onclick="openAP('${c.id}')">+ 添加城市或景点</button>
    <div class="sdivider"></div>
    <div class="s2btns"><button class="editbtn" onclick="openEditC()">✎ 编辑国家</button><button class="delbtn" onclick="delC()">删除</button></div>`;
}

function renderPS(){
  const c=db.countries.find(x=>x.id===cid);const p=c?c.places.find(x=>x.id===pid):null;if(!c||!p)return;
  const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm" style="font-size:11px;padding:2px 7px">${MA[m-1]}</span>`).join('');
  const ptags=(p.tags||[]).map(t=>`<span class="ptc" style="font-size:11px;padding:2px 8px">${e(t)}</span>`).join('');
  const tabs=NC.map(cat=>`<button class="nt${cat===ncat?' act':''}" onclick="swC('${cat}')">${cat}</button>`).join('');
  const notes=(p.notes||[]).filter(n=>n.cat===ncat);
  const done=isPlaceVisited(p);
  const nh=notes.length?notes.map(n=>{
    const gi=(p.notes||[]).indexOf(n);
    const d=new Date(n.ts);const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
    const imgs=(n.images||[]).map((img,ii)=>`<img class="nimg" src="${img}" onclick="openLB('${gi}',${ii})" title="点击放大">`).join('');
    return `<div class="nitem"><div class="ntext">${e(n.text)}</div>${imgs?`<div class="nimgs">${imgs}</div>`:''}<div class="nts">${ds}</div><button class="ndel" onclick="delN(${gi})">×</button></div>`;
  }).join(''):'<div class="nonotes">这个分类还没有内容</div>';

  document.getElementById('si2').innerHTML=`
    <button class="backbtn" onclick="renderCS()">← ${e(c.name)}</button>
    <div class="pdname" title="${e(p.name)}">${e(p.name)}</div>
    <div class="place-status-line">
      <button class="place-check big ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡这个城市'}</button>
      ${done&&p.visitedDate?`<span class="place-visited-date">打卡时间：${p.visitedDate.replace('-','/')}</span>`:''}
    </div>
    <div class="pdmonths">${mh}</div>
    ${ptags?`<div class="pdtags">${ptags}</div>`:''}
    ${p.season?`<div class="pdseason">${e(p.season)}</div>`:''}
    <div class="ntabs">${tabs}</div>
    <div id="nlist">${nh}</div>
    <div class="anw">
      <textarea class="anta" id="nta" placeholder="添加${ncat}备注…"></textarea>
      <div id="img-previews" class="img-preview"></div>
      <div class="an-actions">
        <button class="anbtn" onclick="subN()">+ 添加</button>
        <button class="imgbtn" onclick="document.getElementById('img-input').click()">🖼 图片</button>
      </div>
    </div>
    <div class="sdivider"></div>
    <div class="s2btns"><button class="editbtn" onclick="openEditP()">✎ 编辑景点</button><button class="delbtn" onclick="delP()">删除</button></div>`;
  pendingImgs=[];
}

function rMonth(f,body){
  let h='<div class="mgrid">';
  for(let m=1;m<=12;m++){
    const places=[];f.forEach(c=>c.places.forEach(p=>{if((p.bestMonths||[]).includes(m))places.push({p,c});}));
    h+=`<div class="mcard"><div class="mcard-hdr"><span>${MA[m-1]}</span><small>${places.length}</small></div>`;
    if(!places.length)h+='<div class="mempty">暂无</div>';
    else places.forEach(({p,c})=>{
      const done=isPlaceVisited(p);
      h+=`<div class="mpr" onclick="openPD('${c.id}','${p.id}')">
        <div class="mpr-main">
          <div style="min-width:0">
            <div class="mpr-name" title="${e(p.name)}">${hl(p.name)} ${done?'<span class="badge-place-visited">已打卡</span>':''}</div>
            <div class="mpr-country">${hl(c.name)}</div>
          </div>
          <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓':'打卡'}</button>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  body.innerHTML=h+'</div>';
}

function renderStats(body){
  normalizeCheckins();
  const all=db.countries;
  const visited=all.filter(c=>c.status==='visited');
  const want=all.filter(c=>c.status==='want');
  const allPlaces=all.flatMap(c=>c.places);
  const visitedPlaces=allPlaces.filter(isPlaceVisited);
  const allNotes=allPlaces.flatMap(p=>p.notes||[]);
  const visitedConts=[...new Set(visited.map(c=>c.continent).filter(Boolean))];
  const allConts=[...new Set(all.map(c=>c.continent).filter(Boolean))];
  const totalImgs=allNotes.reduce((s,n)=>s+(n.images||[]).length,0);

  let h=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${visited.length}</div><div class="stat-sub">已打卡国家/地区</div><div class="stat-detail">共 ${all.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${visitedPlaces.length}</div><div class="stat-sub">已打卡城市/景点</div><div class="stat-detail">共 ${allPlaces.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${visitedConts.length}</div><div class="stat-sub">到访大洲/大洋</div><div class="stat-detail">共 ${allConts.length} 个在计划中</div></div>
    <div class="stat-card"><div class="stat-num">${allNotes.length}</div><div class="stat-sub">条备注</div><div class="stat-detail">${totalImgs} 张图片</div></div>
  </div>`;

  if(allConts.length){
    h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>大洲覆盖</span></div>`;
    CO.forEach(cont=>{
      const total=all.filter(c=>c.continent===cont).length;
      const vis=visited.filter(c=>c.continent===cont).length;
      if(!total)return;
      const pct=Math.round(vis/total*100);
      h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${cont}</span><span>${vis}/${total}</span></div><div class="cont-bar-track"><div class="cont-bar-fill${vis?'':' none'}" style="width:${pct}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  const cityTimeline=[];
  all.forEach(c=>(c.places||[]).forEach(p=>{
    if(isPlaceVisited(p))cityTimeline.push({country:c.name,continent:c.continent,name:p.name,date:p.visitedDate||c.visitedDate||''});
  }));
  cityTimeline.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(cityTimeline.length){
    h+=`<div class="timeline"><div class="sec-hdr" style="margin-bottom:12px"><span>城市打卡记录</span></div>`;
    cityTimeline.forEach(x=>{
      const d=x.date||'';
      const parts=d.split('-');
      const ds=parts[0]?(parts[0]+'年'+(parts[1]?parseInt(parts[1])+'月':'')):'已打卡';
      h+=`<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-name">${e(x.name)}</div><div class="tl-date">${ds} · ${e(x.country)} · ${e(x.continent||'')}</div></div></div>`;
    });
    h+=`</div>`;
  }

  const planned=want.filter(c=>c.plannedDate).sort((a,b)=>a.plannedDate.localeCompare(b.plannedDate));
  if(planned.length){
    h+=`<div class="timeline" style="margin-top:10px;border-color:#d4c4a0"><div class="sec-hdr" style="margin-bottom:12px"><span>即将出发</span></div>`;
    planned.forEach(c=>{
      const d=c.plannedDate;const [y,m]=d.split('-');
      h+=`<div class="tl-item"><div class="tl-dot" style="background:#c9a96e"></div><div><div class="tl-name">${e(c.name)}</div><div class="tl-date">${y}年${m?parseInt(m)+'月':''} · ${e(c.continent||'')}</div></div></div>`;
    });
    h+=`</div>`;
  }
  body.innerHTML=h;
}

function setSt(s){
  const c=db.countries.find(x=>x.id===cid);if(!c)return;
  c.status=s;
  if(s==='visited'&&!c.visitedDate){
    c.visitedDate=monthNow();
  }
  if(s!=='visited'&&placeVisitedCount(c)){
    syncCountryByPlaces(c);
  }
  save();
  render();
  renderCS();
}

normalizeCheckins();
save();
render();
</script>

<script>
/* ===== 预算字段 + 环线预算汇总 + 城市打卡时间自定义 ===== */
const BUDGET_CATS=[
  ['flight','机票 / 长途交通'],
  ['hotel','住宿'],
  ['food','餐饮'],
  ['local','市内交通'],
  ['ticket','门票 / 活动'],
  ['shopping','购物'],
  ['other','签证 / 保险 / 其他']
];

function money(n){
  n=Number(n)||0;
  return '¥'+Math.round(n).toLocaleString('zh-CN');
}
function num(v){
  const n=parseFloat(v);
  return isNaN(n)?0:n;
}
function ensureBudget(c){
  if(!c.budget)c.budget={};
  BUDGET_CATS.forEach(([k])=>{c.budget[k]=num(c.budget[k]);});
  c.spent=num(c.spent);
  return c.budget;
}
function budgetTotal(c){
  const b=ensureBudget(c);
  return BUDGET_CATS.reduce((s,[k])=>s+num(b[k]),0);
}
function budgetSpent(c){
  ensureBudget(c);
  return num(c.spent);
}
function budgetNeed(c){
  return Math.max(0,budgetTotal(c)-budgetSpent(c));
}
function circuitBudget(circuitName){
  const list=(db.countries||[]).filter(c=>c.circuit===circuitName);
  const total=list.reduce((s,c)=>s+budgetTotal(c),0);
  const spent=list.reduce((s,c)=>s+budgetSpent(c),0);
  return {total,spent,need:Math.max(0,total-spent),count:list.length};
}
function allBudget(){
  const list=db.countries||[];
  const total=list.reduce((s,c)=>s+budgetTotal(c),0);
  const spent=list.reduce((s,c)=>s+budgetSpent(c),0);
  return {total,spent,need:Math.max(0,total-spent)};
}
function budgetLinesHTML(c){
  const b=ensureBudget(c);
  const rows=BUDGET_CATS.filter(([k])=>num(b[k])>0).map(([k,label])=>`<div class="budget-line"><span>${label}</span><span>${money(b[k])}</span></div>`).join('');
  return rows||'<div style="font-size:12px;color:#b0a080">还没有填写预算</div>';
}
function budgetPanelHTML(c){
  const total=budgetTotal(c),spent=budgetSpent(c),need=budgetNeed(c);
  return `<div class="budget-panel">
    <div class="budget-panel-title"><span>Budget</span><span class="budget-total">${money(total)}</span></div>
    <div class="budget-summary">
      <div class="budget-chip"><b>${money(total)}</b><span>预计总预算</span></div>
      <div class="budget-chip"><b>${money(spent)}</b><span>已经花费</span></div>
      <div class="budget-chip"><b>${money(need)}</b><span>未来还需要</span></div>
    </div>
    <div class="budget-lines">${budgetLinesHTML(c)}</div>
  </div>`;
}
function injectBudgetUI(){
  if(document.getElementById('budget-fields'))return;
  const planned=document.getElementById('ac-planned');
  if(!planned)return;
  const box=`<div class="fg" id="budget-fields">
    <label class="fl">国家预算明细（人民币，可留空）</label>
    <div class="budget-grid">
      ${BUDGET_CATS.map(([k,label])=>`<div class="fg"><label class="fl">${label}</label><input class="fi budget-input" id="bg-${k}" type="number" min="0" step="1" placeholder="0"></div>`).join('')}
      <div class="fg"><label class="fl">已经花费</label><input class="fi budget-input" id="bg-spent" type="number" min="0" step="1" placeholder="0"></div>
    </div>
    <div class="budget-note">国家预算会自动汇总到环线预算和统计页里，“未来还需要”= 预计总预算 - 已经花费。</div>
  </div>`;
  planned.closest('.fg').insertAdjacentHTML('afterend',box);
}
function readBudgetFromForm(){
  const budget={};
  BUDGET_CATS.forEach(([k])=>{
    const el=document.getElementById('bg-'+k);
    budget[k]=el?num(el.value):0;
  });
  const spentEl=document.getElementById('bg-spent');
  return {budget,spent:spentEl?num(spentEl.value):0};
}
function fillBudgetForm(c){
  ensureBudget(c);
  BUDGET_CATS.forEach(([k])=>{
    const el=document.getElementById('bg-'+k);
    if(el)el.value=c.budget[k]||'';
  });
  const spentEl=document.getElementById('bg-spent');
  if(spentEl)spentEl.value=c.spent||'';
}
function resetBudgetForm(){
  BUDGET_CATS.forEach(([k])=>{
    const el=document.getElementById('bg-'+k);
    if(el)el.value='';
  });
  const spentEl=document.getElementById('bg-spent');
  if(spentEl)spentEl.value='';
}

const __oldOpenAC = openAC;
openAC=function(){
  injectBudgetUI();
  __oldOpenAC();
  resetBudgetForm();
};

const __oldOpenEditC = openEditC;
openEditC=function(){
  injectBudgetUI();
  __oldOpenEditC();
  const c=db.countries.find(x=>x.id===cid||x.id===editingCId);
  if(c)fillBudgetForm(c);
};

const __oldSubmitAC = submitAC;
submitAC=function(){
  injectBudgetUI();
  const name=document.getElementById('ac-name').value.trim();
  if(!name)return;
  const data=readBudgetFromForm();
  __oldSubmitAC();
  const target=editingCId?db.countries.find(x=>x.id===editingCId):db.countries[db.countries.length-1];
  if(target&&target.name===name){
    target.budget=data.budget;
    target.spent=data.spent;
    save();
    render();
    buildFUI();
    if(document.getElementById('sheet').classList.contains('open')&&cid===target.id)renderCS();
  }
};

function setPlaceVisitedDate(){
  const c=db.countries.find(x=>x.id===cid);
  const p=c?(c.places||[]).find(x=>x.id===pid):null;
  if(!c||!p)return;
  const val=document.getElementById('pv-input')?document.getElementById('pv-input').value:'';
  if(val){
    p.visited=true;
    p.visitedDate=val;
  }else{
    p.visited=false;
    p.visitedDate=null;
  }
  syncCountryByPlaces(c);
  save();
  render();
  renderPS();
}

function rContinent(f,body){
  normalizeCheckins();
  (db.countries||[]).forEach(ensureBudget);
  const byC={};f.forEach(c=>{const k=c.continent||'其他';if(!byC[k])byC[k]=[];byC[k].push(c);});
  const active=[...CO,'其他'].filter(cont=>byC[cont]&&byC[cont].length);
  let side=`<aside class="atlas-map">
    <div class="atlas-map-title">Atlas View</div>
    <div class="atlas-map-sub">按七大洲五大洋看你的旅行版图。绿色进度代表已经有城市或国家打卡。</div>`;
  active.forEach(cont=>{
    const cs=byC[cont];
    const total=cs.length;
    const visited=cs.filter(c=>c.status==='visited').length;
    const pct=total?Math.round(visited/total*100):0;
    side+=`<a class="atlas-cont" href="#cont-${cont}">
      <div class="atlas-cont-top"><span class="atlas-cont-name">${cont}</span><span class="atlas-cont-count">${visited}/${total}</span></div>
      <div class="atlas-bar"><div class="atlas-bar-fill" style="width:${pct}%"></div></div>
    </a>`;
  });
  const all=allBudget();
  side+=`<div class="budget-panel" style="margin-top:14px;margin-bottom:0">
    <div class="budget-panel-title"><span>All Budget</span></div>
    <div class="budget-lines">
      <div class="budget-line"><span>总预算</span><span>${money(all.total)}</span></div>
      <div class="budget-line"><span>已花费</span><span>${money(all.spent)}</span></div>
      <div class="budget-line"><span>还需要</span><span>${money(all.need)}</span></div>
    </div>
  </div></aside>`;

  let h='<main class="atlas-list">';
  active.forEach(cont=>{
    const cs=byC[cont];
    h+=`<div class="sec" id="cont-${cont}"><div class="sec-hdr"><span>${cont}</span><span class="sec-cnt">${cs.length} 处</span></div>`;
    cs.forEach(c=>h+=ccH(c));h+=`</div>`;
  });
  h+='</main>';
  body.innerHTML=`<div class="atlas-layout">${side}${h}</div>`;
}

function ccH(c){
  syncCountryByPlaces(c);
  ensureBudget(c);
  const tags=(c.tags||[]).map(t=>`<span class="tc">${hl(t)}</span>`).join('');
  const ntot=c.places.reduce((s,p)=>s+(p.notes||[]).length,0);
  const pstr=c.places.length?c.places.length+'处':'';
  const plannedBadge=c.plannedDate&&c.status==='want'?`<span class="badge-date">✈ ${c.plannedDate.replace('-','/')}</span>`:'';
  const visitedBadge=c.visitedDate?`<span class="badge-visited">✓ ${c.visitedDate.replace('-','/')}</span>`:'';
  const cityVisited=placeVisitedCount(c);
  const cityBadge=cityVisited?`<span class="city-count-badge">城市 ${cityVisited}/${c.places.length}</span>`:'';
  const total=budgetTotal(c),need=budgetNeed(c),spent=budgetSpent(c);
  const budgetBadge=total?`<span class="budget-mini">预算 ${money(total)}</span><span class="budget-mini">已花 ${money(spent)}</span><span class="budget-mini need">还需 ${money(need)}</span>`:'';
  return `<div class="cc" id="cc-${c.id}">
    <div class="cc-hdr" onclick="toggleCC('${c.id}')">
      <div class="cc-dot ${c.status||'none'}"></div>
      <div class="cc-name" title="${e(c.name)}">${hl(c.name)}</div>
      <div class="cc-tags">${tags}</div>
      <div class="cc-badges">${plannedBadge}${visitedBadge}${cityBadge}${budgetBadge}<span class="cc-info">${pstr}${ntot?' · '+ntot+'条':''}</span></div>
      <div class="cc-arr">›</div>
    </div>
    <div class="cc-body">
      <div class="cc-actions">
        <button class="cc-act-btn" onclick="cid='${c.id}';openEditC()">✎ 编辑</button>
        <button class="cc-act-btn del" onclick="cid='${c.id}';delCDirect()">删除</button>
      </div>
      <div class="plist">${c.places.map(p=>{
        const prev=(p.notes&&p.notes.length)?p.notes[p.notes.length-1].text:'';
        const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm">${MA[m-1]}</span>`).join('');
        const ptags=(p.tags||[]).map(t=>`<span class="ptc">${hl(t)}</span>`).join('');
        const done=isPlaceVisited(p);
        return `<div class="pr" onclick="openPD('${c.id}','${p.id}')">
          <div class="pr-main">
            <div class="pr-name" title="${e(p.name)}">${hl(p.name)} ${done?`<span class="badge-place-visited">已打卡${p.visitedDate?' '+p.visitedDate.replace('-','/'):''}</span>`:''}</div>
            <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡'}</button>
          </div>
          <div class="pr-tags">${ptags}</div>
          <div class="pr-months">${mh}</div>
          ${prev?`<div class="pr-prev">${e(prev)}</div>`:''}
        </div>`;
      }).join('')}<div class="apr" onclick="openAP('${c.id}')"><span>+</span> 添加城市或景点</div></div>
    </div>
  </div>`;
}

function rCircuit(f,body){
  normalizeCheckins();
  const circs={};f.forEach(c=>{if(c.circuit){if(!circs[c.circuit])circs[c.circuit]=[];circs[c.circuit].push(c);}});
  const keys=Object.keys(circs).sort();
  if(!keys.length){body.innerHTML='<div class="empty-state">还没有自定义环线<br><span style="font-size:12px;opacity:.6">添加目的地时填写「环线」字段即可</span></div>';return;}
  let h='';
  keys.forEach(cn=>{
    const members=circs[cn].slice().sort((a,b)=>(a.circuitOrder||99)-(b.circuitOrder||99));
    const totalDays=members.reduce((s,c)=>s+(c.circuitDays||0),0);
    const b=circuitBudget(cn);
    h+=`<div class="sec"><div class="circ-meta">
      <span class="circ-name">✦ ${e(cn)}</span>
      ${totalDays?`<span class="circ-days-total">共约 ${totalDays} 天</span>`:''}
      <span class="circ-days-total">预算 ${money(b.total)}</span>
      <span class="circ-days-total">已花 ${money(b.spent)}</span>
      <span class="circ-days-total">还需 ${money(b.need)}</span>
    </div><div class="circ-items">`;
    members.forEach((c,i)=>{
      const tags=(c.tags||[]).map(t=>`<span class="tc">${e(t)}</span>`).join('');
      h+=`<div class="circ-item" onclick="cid='${c.id}';renderCS();openSheet()">
        <div class="circ-order">${c.circuitOrder||i+1}</div>
        <div class="circ-item-body"><div class="circ-item-name">${hl(c.name)}</div><div class="circ-item-meta">${e(c.continent||'')} ${tags}<br>预算 ${money(budgetTotal(c))} · 已花 ${money(budgetSpent(c))} · 还需 ${money(budgetNeed(c))}</div></div>
        ${c.circuitDays?`<div class="circ-item-days">${c.circuitDays}天</div>`:''}
        <div class="circ-reorder">
          <button onclick="event.stopPropagation();moveCircuit('${c.id}',-1)">▲</button>
          <button onclick="event.stopPropagation();moveCircuit('${c.id}',1)">▼</button>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  body.innerHTML=h;
}

function renderCS(){
  const c=db.countries.find(x=>x.id===cid);if(!c)return;
  syncCountryByPlaces(c);ensureBudget(c);
  const wA=c.status==='want'?'act':'',vA=c.status==='visited'?'act':'',nA=(!c.status||c.status==='none')?'act':'';
  const tags=(c.tags||[]).map(t=>`<span class="tc" style="font-size:11px;padding:2px 8px">${e(t)}</span>`).join('');
  const cityVisited=placeVisitedCount(c);
  const ph=c.places.length?c.places.map(p=>{
    const prev=(p.notes&&p.notes.length)?p.notes[p.notes.length-1].text:'';
    const ptags=(p.tags||[]).map(t=>`<span class="ptc" style="font-size:10px;padding:1px 6px">${e(t)}</span>`).join('');
    const done=isPlaceVisited(p);
    return `<div class="pi2" onclick="openPD('${c.id}','${p.id}')">
      <div class="pi2-main">
        <div style="min-width:0">
          <div class="pi2-name" title="${e(p.name)}">${e(p.name)} ${done?`<span class="badge-place-visited">已打卡${p.visitedDate?' '+p.visitedDate.replace('-','/'):''}</span>`:''}</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${ptags}</div>
          ${prev?`<div class="pi2-prev">${e(prev)}</div>`:''}
        </div>
        <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡'}</button>
      </div>
    </div>`;
  }).join(''):'<div style="color:#b0a080;font-size:12px;padding:4px 0 8px">还没有添加景点</div>';

  const metaInfo=[];
  if(c.circuit)metaInfo.push(`环线：${e(c.circuit)}${c.circuitDays?' · '+c.circuitDays+'天':''}`);
  if(c.plannedDate&&c.status==='want')metaInfo.push(`计划出发：${c.plannedDate.replace('-','/')}`);
  if(c.visitedDate)metaInfo.push(`国家打卡时间：${c.visitedDate.replace('-','/')}`);
  if(c.places&&c.places.length)metaInfo.push(`城市打卡：${cityVisited}/${c.places.length}`);

  document.getElementById('si2').innerHTML=`
    <div class="cs-top">
      <div style="min-width:0">
        <div class="cs-eye">${e(c.continent||'')}</div>
        <div class="cs-name" title="${e(c.name)}">${e(c.name)}</div>
        ${metaInfo.map(m=>`<div style="font-size:11px;color:#a08060;margin-top:2px">${m}</div>`).join('')}
        ${tags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${tags}</div>`:''}
      </div>
      <button class="sclose" onclick="closeSheet()">×</button>
    </div>
    <div class="sr">
      <button class="sb sb-want ${wA}" onclick="setSt('want')">✦ 想去</button>
      <button class="sb sb-visited ${vA}" onclick="setSt('visited')">✓ 打卡</button>
      <button class="sb sb-none ${nA}" onclick="setSt('none')">待规划</button>
    </div>
    <div class="visited-date-row${c.status==='visited'?' show':''}" id="vd-row">
      <label>国家打卡时间</label>
      <input class="visited-date-input" type="month" id="vd-input" value="${c.visitedDate||''}">
      <button class="visited-date-save" onclick="saveVisitedDate()">保存</button>
    </div>
    ${budgetPanelHTML(c)}
    <div class="slbl">城市 / 景点</div>${ph}
    <button class="apbtn" onclick="openAP('${c.id}')">+ 添加城市或景点</button>
    <div class="sdivider"></div>
    <div class="s2btns"><button class="editbtn" onclick="openEditC()">✎ 编辑国家</button><button class="delbtn" onclick="delC()">删除</button></div>`;
}

function renderPS(){
  const c=db.countries.find(x=>x.id===cid);const p=c?c.places.find(x=>x.id===pid):null;if(!c||!p)return;
  const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm" style="font-size:11px;padding:2px 7px">${MA[m-1]}</span>`).join('');
  const ptags=(p.tags||[]).map(t=>`<span class="ptc" style="font-size:11px;padding:2px 8px">${e(t)}</span>`).join('');
  const tabs=NC.map(cat=>`<button class="nt${cat===ncat?' act':''}" onclick="swC('${cat}')">${cat}</button>`).join('');
  const notes=(p.notes||[]).filter(n=>n.cat===ncat);
  const done=isPlaceVisited(p);
  const nh=notes.length?notes.map(n=>{
    const gi=(p.notes||[]).indexOf(n);
    const d=new Date(n.ts);const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
    const imgs=(n.images||[]).map((img,ii)=>`<img class="nimg" src="${img}" onclick="openLB('${gi}',${ii})" title="点击放大">`).join('');
    return `<div class="nitem"><div class="ntext">${e(n.text)}</div>${imgs?`<div class="nimgs">${imgs}</div>`:''}<div class="nts">${ds}</div><button class="ndel" onclick="delN(${gi})">×</button></div>`;
  }).join(''):'<div class="nonotes">这个分类还没有内容</div>';

  document.getElementById('si2').innerHTML=`
    <button class="backbtn" onclick="renderCS()">← ${e(c.name)}</button>
    <div class="pdname" title="${e(p.name)}">${e(p.name)}</div>
    <div class="place-status-line">
      <button class="place-check big ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡这个城市'}</button>
      <div class="place-date-editor">
        <span class="place-visited-date">${done?'打卡时间':'自定义打卡时间'}</span>
        <input type="month" id="pv-input" value="${p.visitedDate||''}">
        <button onclick="setPlaceVisitedDate()">保存</button>
      </div>
    </div>
    <div class="pdmonths">${mh}</div>
    ${ptags?`<div class="pdtags">${ptags}</div>`:''}
    ${p.season?`<div class="pdseason">${e(p.season)}</div>`:''}
    <div class="ntabs">${tabs}</div>
    <div id="nlist">${nh}</div>
    <div class="anw">
      <textarea class="anta" id="nta" placeholder="添加${ncat}备注…"></textarea>
      <div id="img-previews" class="img-preview"></div>
      <div class="an-actions">
        <button class="anbtn" onclick="subN()">+ 添加</button>
        <button class="imgbtn" onclick="document.getElementById('img-input').click()">🖼 图片</button>
      </div>
    </div>
    <div class="sdivider"></div>
    <div class="s2btns"><button class="editbtn" onclick="openEditP()">✎ 编辑景点</button><button class="delbtn" onclick="delP()">删除</button></div>`;
  pendingImgs=[];
}

function renderStats(body){
  normalizeCheckins();
  (db.countries||[]).forEach(ensureBudget);
  const all=db.countries;
  const visited=all.filter(c=>c.status==='visited');
  const want=all.filter(c=>c.status==='want');
  const allPlaces=all.flatMap(c=>c.places);
  const visitedPlaces=allPlaces.filter(isPlaceVisited);
  const allNotes=allPlaces.flatMap(p=>p.notes||[]);
  const visitedConts=[...new Set(visited.map(c=>c.continent).filter(Boolean))];
  const allConts=[...new Set(all.map(c=>c.continent).filter(Boolean))];
  const totalImgs=allNotes.reduce((s,n)=>s+(n.images||[]).length,0);
  const b=allBudget();

  let h=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${visited.length}</div><div class="stat-sub">已打卡国家/地区</div><div class="stat-detail">共 ${all.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${visitedPlaces.length}</div><div class="stat-sub">已打卡城市/景点</div><div class="stat-detail">共 ${allPlaces.length} 处在册</div></div>
    <div class="stat-card"><div class="stat-num">${money(b.need)}</div><div class="stat-sub">未来还需要</div><div class="stat-detail">总预算 ${money(b.total)} · 已花 ${money(b.spent)}</div></div>
    <div class="stat-card"><div class="stat-num">${allNotes.length}</div><div class="stat-sub">条备注</div><div class="stat-detail">${totalImgs} 张图片</div></div>
  </div>`;

  const circs=[...new Set(all.map(c=>c.circuit).filter(Boolean))];
  if(circs.length){
    h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>环线预算</span></div>`;
    circs.forEach(cn=>{
      const cb=circuitBudget(cn);
      h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${e(cn)}</span><span>总 ${money(cb.total)} · 已花 ${money(cb.spent)} · 还需 ${money(cb.need)}</span></div><div class="cont-bar-track"><div class="cont-bar-fill" style="width:${cb.total?Math.min(100,Math.round(cb.spent/cb.total*100)):0}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  if(allConts.length){
    h+=`<div class="cont-bars"><div class="sec-hdr" style="margin-bottom:12px"><span>大洲覆盖</span></div>`;
    CO.forEach(cont=>{
      const total=all.filter(c=>c.continent===cont).length;
      const vis=visited.filter(c=>c.continent===cont).length;
      if(!total)return;
      const pct=Math.round(vis/total*100);
      h+=`<div class="cont-bar-row"><div class="cont-bar-label"><span>${cont}</span><span>${vis}/${total}</span></div><div class="cont-bar-track"><div class="cont-bar-fill${vis?'':' none'}" style="width:${pct}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  const cityTimeline=[];
  all.forEach(c=>(c.places||[]).forEach(p=>{
    if(isPlaceVisited(p))cityTimeline.push({country:c.name,continent:c.continent,name:p.name,date:p.visitedDate||c.visitedDate||''});
  }));
  cityTimeline.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(cityTimeline.length){
    h+=`<div class="timeline"><div class="sec-hdr" style="margin-bottom:12px"><span>城市打卡记录</span></div>`;
    cityTimeline.forEach(x=>{
      const d=x.date||'';
      const parts=d.split('-');
      const ds=parts[0]?(parts[0]+'年'+(parts[1]?parseInt(parts[1])+'月':'')):'已打卡';
      h+=`<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-name">${e(x.name)}</div><div class="tl-date">${ds} · ${e(x.country)} · ${e(x.continent||'')}</div></div></div>`;
    });
    h+=`</div>`;
  }

  const planned=want.filter(c=>c.plannedDate).sort((a,b)=>a.plannedDate.localeCompare(b.plannedDate));
  if(planned.length){
    h+=`<div class="timeline" style="margin-top:10px;border-color:#d4c4a0"><div class="sec-hdr" style="margin-bottom:12px"><span>即将出发</span></div>`;
    planned.forEach(c=>{
      const d=c.plannedDate;const [y,m]=d.split('-');
      h+=`<div class="tl-item"><div class="tl-dot" style="background:#c9a96e"></div><div><div class="tl-name">${e(c.name)}</div><div class="tl-date">${y}年${m?parseInt(m)+'月':''} · ${e(c.continent||'')} · 还需 ${money(budgetNeed(c))}</div></div></div>`;
    });
    h+=`</div>`;
  }

  body.innerHTML=h;
}

injectBudgetUI();
(db.countries||[]).forEach(ensureBudget);
save();
render();
</script>

<script>
/* ===== 修正逻辑：地区列表、全局旅行资金、预算统计面板 ===== */
const FULL_CO=['亚洲','欧洲','非洲','北美洲','中美洲','加勒比海','南美洲','大洋洲','太平洋岛国','太平洋','大西洋','印度洋','北冰洋','南极洲','中东','高加索','巴尔干','中亚','北欧','波罗的海'];
try{
  CO.splice(0,CO.length,...FULL_CO);
}catch(e){}

function refreshContinentOptions(){
  const sel=document.getElementById('ac-cont');
  if(!sel)return;
  const current=sel.value||'亚洲';
  sel.innerHTML=FULL_CO.map(x=>`<option>${x}</option>`).join('');
  sel.value=FULL_CO.includes(current)?current:'亚洲';
}

function ensureSettings(){
  if(!db.settings)db.settings={};
  db.settings.travelFund=num(db.settings.travelFund);
  return db.settings;
}
function travelFund(){
  return ensureSettings().travelFund||0;
}
function setTravelFundFromInput(){
  const el=document.getElementById('travel-fund-input');
  if(!el)return;
  ensureSettings().travelFund=num(el.value);
  save();
  render();
}
function adjustTravelFund(sign){
  const el=document.getElementById('travel-fund-delta');
  const delta=el?num(el.value):0;
  if(!delta)return;
  ensureSettings().travelFund=Math.max(0,travelFund()+sign*delta);
  save();
  render();
}
function pct(part,total){
  if(!total)return 0;
  return Math.max(0,Math.min(100,Math.round(part/total*100)));
}
function countryBudgetDetailHTML(c){
  ensureBudget(c);
  const rows=BUDGET_CATS.filter(([k])=>num(c.budget[k])>0).map(([k,label])=>`<span>${label} ${money(c.budget[k])}</span>`).join('');
  return rows||'<span>还没填预算明细</span>';
}
function countryBudgetStripHTML(c){
  const total=budgetTotal(c),spent=budgetSpent(c),need=budgetNeed(c);
  if(!total&&!spent)return '';
  return `<div class="country-budget-strip">
    <div class="country-budget-box"><b>${money(total)}</b><span>国家总预算</span></div>
    <div class="country-budget-box"><b>${money(spent)}</b><span>已经花费</span></div>
    <div class="country-budget-box"><b>${money(need)}</b><span>未来还需</span></div>
    <div class="country-budget-detail">${countryBudgetDetailHTML(c)}</div>
  </div>`;
}

const __openAC_v3=openAC;
openAC=function(){
  refreshContinentOptions();
  __openAC_v3();
  refreshContinentOptions();
};
const __openEditC_v3=openEditC;
openEditC=function(){
  refreshContinentOptions();
  __openEditC_v3();
  refreshContinentOptions();
  const c=db.countries.find(x=>x.id===cid||x.id===editingCId);
  if(c){
    const sel=document.getElementById('ac-cont');
    if(sel)sel.value=c.continent||'亚洲';
  }
};

function ccH(c){
  syncCountryByPlaces(c);
  ensureBudget(c);
  const tags=(c.tags||[]).map(t=>`<span class="tc">${hl(t)}</span>`).join('');
  const ntot=c.places.reduce((s,p)=>s+(p.notes||[]).length,0);
  const pstr=c.places.length?c.places.length+'处':'';
  const plannedBadge=c.plannedDate&&c.status==='want'?`<span class="badge-date">✈ ${c.plannedDate.replace('-','/')}</span>`:'';
  const visitedBadge=c.visitedDate?`<span class="badge-visited">✓ ${c.visitedDate.replace('-','/')}</span>`:'';
  const cityVisited=placeVisitedCount(c);
  const cityBadge=cityVisited?`<span class="city-count-badge">城市 ${cityVisited}/${c.places.length}</span>`:'';
  const total=budgetTotal(c);
  const budgetBadge=total?`<span class="budget-mini">预算 ${money(total)}</span>`:'';
  return `<div class="cc" id="cc-${c.id}">
    <div class="cc-hdr" onclick="toggleCC('${c.id}')">
      <div class="cc-dot ${c.status||'none'}"></div>
      <div class="cc-name" title="${e(c.name)}">${hl(c.name)}</div>
      <div class="cc-tags">${tags}</div>
      <div class="cc-badges">${plannedBadge}${visitedBadge}${cityBadge}${budgetBadge}<span class="cc-info">${pstr}${ntot?' · '+ntot+'条':''}</span></div>
      <div class="cc-arr">›</div>
    </div>
    ${countryBudgetStripHTML(c)}
    <div class="cc-body">
      <div class="cc-actions">
        <button class="cc-act-btn" onclick="cid='${c.id}';openEditC()">✎ 编辑</button>
        <button class="cc-act-btn del" onclick="cid='${c.id}';delCDirect()">删除</button>
      </div>
      <div class="plist">${c.places.map(p=>{
        const prev=(p.notes&&p.notes.length)?p.notes[p.notes.length-1].text:'';
        const mh=(p.bestMonths||[]).sort((a,b)=>a-b).map(m=>`<span class="pm">${MA[m-1]}</span>`).join('');
        const ptags=(p.tags||[]).map(t=>`<span class="ptc">${hl(t)}</span>`).join('');
        const done=isPlaceVisited(p);
        return `<div class="pr" onclick="openPD('${c.id}','${p.id}')">
          <div class="pr-main">
            <div class="pr-name" title="${e(p.name)}">${hl(p.name)} ${done?`<span class="badge-place-visited">已打卡${p.visitedDate?' '+p.visitedDate.replace('-','/'):''}</span>`:''}</div>
            <button class="place-check ${done?'done':''}" onclick="togglePlaceVisit('${c.id}','${p.id}',event)">${done?'✓ 已打卡':'打卡'}</button>
          </div>
          <div class="pr-tags">${ptags}</div>
          <div class="pr-months">${mh}</div>
          ${prev?`<div class="pr-prev">${e(prev)}</div>`:''}
        </div>`;
      }).join('')}<div class="apr" onclick="openAP('${c.id}')"><span>+</span> 添加城市或景点</div></div>
    </div>
  </div>`;
}

function rContinent(f,body){
  normalizeCheckins();
  ensureSettings();
  (db.countries||[]).forEach(ensureBudget);
  const byC={};f.forEach(c=>{const k=c.continent||'其他';if(!byC[k])byC[k]=[];byC[k].push(c);});
  const active=[...FULL_CO,'其他'].filter(cont=>byC[cont]&&byC[cont].length);
  let side=`<aside class="atlas-map">
    <div class="atlas-map-title">Atlas View</div>
    <div class="atlas-map-sub">只保留七大洲五大洋。绿色进度代表该区域里已经打卡的国家/地区。</div>`;
  active.forEach(cont=>{
    const cs=byC[cont];
    const total=cs.length;
    const visited=cs.filter(c=>c.status==='visited').length;
    const p=pct(visited,total);
    side+=`<a class="atlas-cont" href="#cont-${cont}">
      <div class="atlas-cont-top"><span class="atlas-cont-name">${cont}</span><span class="atlas-cont-count">${visited}/${total}</span></div>
      <div class="atlas-bar"><div class="atlas-bar-fill" style="width:${p}%"></div></div>
    </a>`;
  });
  const all=allBudget();
  side+=`<div class="budget-panel" style="margin-top:14px;margin-bottom:0">
    <div class="budget-panel-title"><span>Budget</span></div>

refreshContinentOptions();
ensureSettings();
(db.countries||[]).forEach(ensureBudget);

render();

const BIG_REGIONS=['亚洲','欧洲','非洲','北美洲','南美洲','大洋洲','南极洲','太平洋','大西洋','印度洋','北冰洋','南冰洋'];

const REGION_NORMALIZE_MAP={
